<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="880" height="460" fill="#ffffff"/>
  <text x="40" y="38" font-size="20" font-weight="700" fill="#1a1a1a">예시 화면 — 이벤트 목록 페이지에서 세 계층이 하는 일</text>
  <text x="40" y="62" font-size="13.5" fill="#6b6b6b">같은 카드 하나에도 HTML·CSS·JavaScript의 책임이 겹쳐 있습니다.</text>

  <!-- 브라우저 프레임 -->
  <rect x="40" y="80" width="600" height="360" rx="10" fill="#ffffff" stroke="#d9dde3"/>
  <rect x="40" y="80" width="600" height="34" rx="10" fill="#f4f5f7" stroke="#d9dde3"/>
  <circle cx="60" cy="97" r="5" fill="#f7c0c8"/><circle cx="78" cy="97" r="5" fill="#f3d488"/><circle cx="96" cy="97" r="5" fill="#bfe3cb"/>
  <rect x="150" y="88" width="360" height="18" rx="9" fill="#ffffff" stroke="#e3e6ea"/><text x="164" y="101" font-size="10.5" fill="#9aa0a6">rsvp.example.com/events</text>

  <!-- 헤더 -->
  <text x="64" y="146" font-size="16" font-weight="700" fill="#1a1a1a">이벤트</text>
  <text x="560" y="146" font-size="12" fill="#3a6fd6" text-anchor="end">로그인</text>
  <line x1="60" y1="158" x2="620" y2="158" stroke="#eef0f2"/>

  <!-- 카드 3개 -->
  <g>
    <!-- card1 -->
    <rect x="64" y="176" width="168" height="230" rx="8" fill="#ffffff" stroke="#e3e6ea"/>
    <rect x="80" y="192" width="54" height="20" rx="10" fill="#eef3fd" stroke="#bcd0f5"/><text x="107" y="206" font-size="10" fill="#3a6fd6" text-anchor="middle">모집중</text>
    <text x="80" y="240" font-size="13" font-weight="700" fill="#1a1a1a">봄 워크숍</text>
    <text x="80" y="262" font-size="10.5" fill="#6b6b6b">2026-05-15 19:00</text>
    <text x="80" y="280" font-size="10.5" fill="#6b6b6b">강남 스타벅스</text>
    <text x="80" y="306" font-size="10.5" fill="#9aa0a6">신청 12 / 정원 20</text>
    <rect x="80" y="330" width="136" height="34" rx="6" fill="#3a6fd6"/><text x="148" y="352" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">신청하기</text>
    <!-- card2 -->
    <rect x="248" y="176" width="168" height="230" rx="8" fill="#ffffff" stroke="#e3e6ea"/>
    <rect x="264" y="192" width="54" height="20" rx="10" fill="#eef3fd" stroke="#bcd0f5"/><text x="291" y="206" font-size="10" fill="#3a6fd6" text-anchor="middle">모집중</text>
    <text x="264" y="240" font-size="13" font-weight="700" fill="#1a1a1a">코드 리뷰 데이</text>
    <text x="264" y="262" font-size="10.5" fill="#6b6b6b">2026-05-22 14:00</text>
    <text x="264" y="280" font-size="10.5" fill="#6b6b6b">사내 3층</text>
    <text x="264" y="306" font-size="10.5" fill="#9aa0a6">신청 8 / 정원 15</text>
    <rect x="264" y="330" width="136" height="34" rx="6" fill="#3a6fd6"/><text x="332" y="352" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">신청하기</text>
    <!-- card3 -->
    <rect x="432" y="176" width="168" height="230" rx="8" fill="#ffffff" stroke="#e3e6ea"/>
    <rect x="448" y="192" width="42" height="20" rx="10" fill="#f4f5f7" stroke="#d9dde3"/><text x="469" y="206" font-size="10" fill="#888" text-anchor="middle">마감</text>
    <text x="448" y="240" font-size="13" font-weight="700" fill="#1a1a1a">해커톤</text>
    <text x="448" y="262" font-size="10.5" fill="#6b6b6b">2026-05-03 10:00</text>
    <text x="448" y="280" font-size="10.5" fill="#6b6b6b">온라인</text>
    <text x="448" y="306" font-size="10.5" fill="#9aa0a6">신청 20 / 정원 20</text>
    <rect x="448" y="330" width="136" height="34" rx="6" fill="#f4f5f7" stroke="#d9dde3"/><text x="516" y="352" font-size="12" font-weight="700" fill="#9aa0a6" text-anchor="middle">마감됨</text>
  </g>

  <!-- 주석 (오른쪽) -->
  <rect x="660" y="176" width="196" height="66" rx="8" fill="#fff7e6" stroke="#f3d488"/>
  <text x="674" y="198" font-size="12" font-weight="700" fill="#b8860b">HTML — 구조</text>
  <text x="674" y="218" font-size="10.5" fill="#444">카드·제목·날짜·버튼을</text>
  <text x="674" y="233" font-size="10.5" fill="#444">순서·의미대로 배치</text>

  <rect x="660" y="252" width="196" height="66" rx="8" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="674" y="274" font-size="12" font-weight="700" fill="#3a6fd6">CSS — 표현</text>
  <text x="674" y="294" font-size="10.5" fill="#444">너비·그림자·색·상태 배지,</text>
  <text x="674" y="309" font-size="10.5" fill="#444">폰 1열→PC 3열 반응형</text>

  <rect x="660" y="328" width="196" height="78" rx="8" fill="#fdeef1" stroke="#f7c0c8"/>
  <text x="674" y="350" font-size="12" font-weight="700" fill="#E8344E">JavaScript — 행동</text>
  <text x="674" y="370" font-size="10.5" fill="#444">신청 클릭 → 참여자 +1,</text>
  <text x="674" y="385" font-size="10.5" fill="#444">버튼 '취소'로, 알림 표시,</text>
  <text x="674" y="400" font-size="10.5" fill="#444">마감이면 버튼 비활성</text>
</svg>
