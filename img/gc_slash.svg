<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">꼭 익힐 슬래시 명령 6개</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">채팅창에 / 로 시작하는 약어로 메타 작업(에이전트 동작 조정)을 빠르게 부릅니다.</text>

  <!-- row 1 -->
  <rect x="40" y="92" width="266" height="88" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="118" font-size="13" font-weight="700" fill="#3a6fd6">/help</text>
  <text x="60" y="140" font-size="10.5" fill="#1a1a1a">명령 목록·도움말</text>
  <text x="60" y="160" font-size="10" fill="#6b6b6b">막힐 때</text>

  <rect x="317" y="92" width="266" height="88" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="337" y="118" font-size="13" font-weight="700" fill="#3a6fd6">/init</text>
  <text x="337" y="140" font-size="10.5" fill="#1a1a1a">폴더 분석해 CLAUDE.md 생성</text>
  <text x="337" y="160" font-size="10" fill="#6b6b6b">새 프로젝트 시작 시</text>

  <rect x="594" y="92" width="266" height="88" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="614" y="118" font-size="13" font-weight="700" fill="#3a6fd6">/clear</text>
  <text x="614" y="140" font-size="10.5" fill="#1a1a1a">누적 컨텍스트 비우기</text>
  <text x="614" y="160" font-size="10" fill="#6b6b6b">한 작업 끝내고 다음으로</text>

  <!-- row 2 -->
  <rect x="40" y="192" width="266" height="88" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="60" y="218" font-size="13" font-weight="700" fill="#1a7f37">/permissions</text>
  <text x="60" y="240" font-size="10.5" fill="#1a1a1a">권한 상태 보기·조정</text>
  <text x="60" y="260" font-size="10" fill="#6b6b6b">권한이 헷갈릴 때</text>

  <rect x="317" y="192" width="266" height="88" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="337" y="218" font-size="13" font-weight="700" fill="#1a7f37">/compact</text>
  <text x="337" y="240" font-size="10.5" fill="#1a1a1a">컨텍스트를 요약·압축</text>
  <text x="337" y="260" font-size="10" fill="#6b6b6b">80% 이상 찼을 때</text>

  <rect x="594" y="192" width="266" height="88" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="614" y="218" font-size="13" font-weight="700" fill="#1a7f37">/exit</text>
  <text x="614" y="240" font-size="10.5" fill="#1a1a1a">현재 세션 종료</text>
  <text x="614" y="260" font-size="10" fill="#6b6b6b">작업이 끝났을 때</text>
</svg>
