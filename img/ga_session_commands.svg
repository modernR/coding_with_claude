<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="260" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">세션 관리 명령어 — 작업 전환 시의 기본 습관</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">비용은 폭발한 뒤가 아니라 넘기 전에 잡습니다. 전환할 때마다 확인·초기화합니다.</text>
  <defs>
    <marker id="sc_a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker>
  </defs>
  <rect x="40" y="100" width="180" height="70" rx="11" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="130" y="128" font-size="13" font-weight="700" fill="#3a6fd6" text-anchor="middle">/cost</text>
  <text x="130" y="150" font-size="10" fill="#444" text-anchor="middle">누적 토큰·비용 확인</text>
  <line x1="222" y1="135" x2="256" y2="135" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sc_a)"/>
  <rect x="258" y="100" width="180" height="70" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="348" y="128" font-size="13" font-weight="700" fill="#1a7f37" text-anchor="middle">/context</text>
  <text x="348" y="150" font-size="10" fill="#444" text-anchor="middle">어디서 점유하나 확인</text>
  <line x1="440" y1="135" x2="474" y2="135" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sc_a)"/>
  <rect x="476" y="100" width="180" height="70" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="566" y="122" font-size="13" font-weight="700" fill="#b8860b" text-anchor="middle">/compact</text>
  <text x="566" y="142" font-size="10" fill="#444" text-anchor="middle">같은 작업 이어갈 때</text>
  <text x="566" y="158" font-size="10" fill="#6b6b6b" text-anchor="middle">대화 요약 압축</text>
  <line x1="658" y1="135" x2="692" y2="135" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sc_a)"/>
  <rect x="694" y="100" width="166" height="70" rx="11" fill="#fdecef" stroke="#f3b8c4"/>
  <text x="777" y="122" font-size="13" font-weight="700" fill="#b00020" text-anchor="middle">/clear</text>
  <text x="777" y="142" font-size="10" fill="#444" text-anchor="middle">다른 작업 시작 시</text>
  <text x="777" y="158" font-size="10" fill="#6b6b6b" text-anchor="middle">0K부터 다시</text>
  <text x="450" y="205" font-size="11" fill="#6b6b6b" text-anchor="middle">"1개 작업 = 1개 세션" · 300K를 넘으면 /compact 또는 /clear · /model로 런타임 모델 전환</text>
  <text x="450" y="232" font-size="10.5" fill="#7c3aed" text-anchor="middle">비용 절감이 필요하면 /model haiku, 복잡 작업은 /model opus로 세션 중 전환</text>
</svg>
