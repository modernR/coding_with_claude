<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">서브에이전트 협력 PRD 생성 파이프라인</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">코디네이터가 전문가 6명을 병렬 호출하고, prd-writer가 마지막에 통합합니다.</text>

  <defs><marker id="vca6sp_ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- 입력 -->
  <rect x="40" y="92" width="170" height="52" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="125" y="115" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">한 줄 아이디어</text>
  <text x="125" y="133" font-size="9.5" fill="#6b6b6b" text-anchor="middle">"RSVP 대기열 기능"</text>

  <!-- 코디네이터 -->
  <rect x="250" y="86" width="200" height="64" rx="11" fill="#ede9fe" stroke="#a78bda"/>
  <text x="350" y="110" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">메인 PRD 코디네이터</text>
  <text x="350" y="130" font-size="9.5" fill="#444" text-anchor="middle">입력 분석 · 도메인 감지</text>
  <text x="350" y="144" font-size="9" fill="#6b6b6b" text-anchor="middle">model: opus</text>
  <line x1="210" y1="118" x2="248" y2="118" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>

  <!-- 병렬 전문가 6 -->
  <text x="490" y="104" font-size="11" font-weight="700" fill="#3a6fd6">전문가 6명 병렬 호출</text>
  <rect x="490" y="112" width="185" height="40" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="500" y="130" font-size="10" font-weight="700" fill="#3a6fd6">market-researcher</text>
  <text x="500" y="145" font-size="9" fill="#444">경쟁·트렌드·시장 규모</text>

  <rect x="685" y="112" width="185" height="40" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="695" y="130" font-size="10" font-weight="700" fill="#3a6fd6">user-researcher</text>
  <text x="695" y="145" font-size="9" fill="#444">페르소나·시나리오</text>

  <rect x="490" y="160" width="185" height="40" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="500" y="178" font-size="10" font-weight="700" fill="#3a6fd6">tech-architect</text>
  <text x="500" y="193" font-size="9" fill="#444">아키텍처·DB·API</text>

  <rect x="685" y="160" width="185" height="40" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="695" y="178" font-size="10" font-weight="700" fill="#3a6fd6">ux-designer</text>
  <text x="695" y="193" font-size="9" fill="#444">UX 흐름·와이어프레임</text>

  <rect x="490" y="208" width="185" height="40" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="500" y="226" font-size="10" font-weight="700" fill="#3a6fd6">legal-reviewer</text>
  <text x="500" y="241" font-size="9" fill="#444">도메인 법규·개인정보</text>

  <rect x="685" y="208" width="185" height="40" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="695" y="226" font-size="10" font-weight="700" fill="#3a6fd6">risk-analyst</text>
  <text x="695" y="241" font-size="9" fill="#444">Top 10 위험·완화</text>

  <line x1="450" y1="118" x2="488" y2="132" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>
  <line x1="450" y1="126" x2="488" y2="180" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>
  <line x1="450" y1="134" x2="488" y2="228" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>

  <!-- prd-writer 통합 -->
  <rect x="490" y="272" width="380" height="52" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="680" y="295" font-size="12" font-weight="700" fill="#b8860b" text-anchor="middle">prd-writer — 여섯 결과를 표준 템플릿으로 통합</text>
  <text x="680" y="314" font-size="9.5" fill="#6b6b6b" text-anchor="middle">병렬이 모두 끝난 뒤 마지막에 실행 · 톤 일관성 유지</text>
  <line x1="680" y1="248" x2="680" y2="270" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>

  <!-- 자가점검 + 완성 -->
  <rect x="250" y="272" width="200" height="52" rx="11" fill="#ede9fe" stroke="#a78bda"/>
  <text x="350" y="295" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">코디네이터 자가 점검</text>
  <text x="350" y="313" font-size="9.5" fill="#6b6b6b" text-anchor="middle">누락·모순·측정 가능성</text>
  <line x1="488" y1="298" x2="452" y2="298" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>

  <rect x="250" y="346" width="360" height="50" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="430" y="369" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">완성 PRD → Notion·git 저장 + 사용자 검토 요청</text>
  <text x="430" y="387" font-size="9.5" fill="#6b6b6b" text-anchor="middle">30~60분 · 12개 섹션 완비 · 위험 상위 자동 강조</text>
  <line x1="350" y1="324" x2="350" y2="344" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6sp_ar)"/>
</svg>
