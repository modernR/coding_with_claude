<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">MCP 프로토콜 구조 — 클라이언트와 서버, 그리고 세 가지 능력</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">MCP는 JSON-RPC 2.0 기반의 표준 통신 규약입니다. 서버가 세 가지를 노출하면 클라이언트가 씁니다.</text>
  <defs>
    <marker id="vca2proto_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect x="40" y="100" width="230" height="250" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="155" y="128" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">클라이언트</text>
  <text x="155" y="147" font-size="11" fill="#6b6b6b" text-anchor="middle">Cowork (에이전트)</text>
  <rect x="60" y="165" width="190" height="60" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="155" y="190" font-size="10.5" fill="#444" text-anchor="middle">사용자의 자연어 요청을 받아</text>
  <text x="155" y="208" font-size="10.5" fill="#444" text-anchor="middle">"어느 도구를 부를지" 판단</text>
  <rect x="60" y="240" width="190" height="90" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="155" y="264" font-size="10.5" fill="#444" text-anchor="middle">initialize · tools/list</text>
  <text x="155" y="284" font-size="10.5" fill="#444" text-anchor="middle">tools/call · shutdown</text>
  <text x="155" y="308" font-size="9.5" fill="#9aa0a6" text-anchor="middle">표준 메시지로만 대화</text>

  <line x1="270" y1="225" x2="358" y2="225" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca2proto_arr)"/>
  <text x="314" y="216" font-size="10" fill="#6b6b6b" text-anchor="middle">요청</text>
  <line x1="358" y1="255" x2="270" y2="255" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca2proto_arr)"/>
  <text x="314" y="277" font-size="10" fill="#6b6b6b" text-anchor="middle">응답</text>

  <rect x="360" y="100" width="500" height="250" rx="12" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="610" y="128" font-size="14" font-weight="700" fill="#1a1a1a" text-anchor="middle">MCP 서버 (자체)</text>
  <text x="610" y="147" font-size="11" fill="#6b6b6b" text-anchor="middle">사내 시스템을 감싸 세 가지 능력을 노출</text>

  <rect x="380" y="165" width="150" height="165" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="455" y="190" font-size="13" font-weight="700" fill="#3a6fd6" text-anchor="middle">Tools</text>
  <text x="455" y="210" font-size="10" fill="#444" text-anchor="middle">호출 가능한 함수</text>
  <text x="455" y="228" font-size="10" fill="#444" text-anchor="middle">입력·출력 스키마 명시</text>
  <text x="455" y="256" font-size="9.5" fill="#6b6b6b" text-anchor="middle">"매물을 검색해줘"</text>
  <text x="455" y="272" font-size="9.5" fill="#6b6b6b" text-anchor="middle">search_listings()</text>
  <text x="455" y="308" font-size="9.5" fill="#9aa0a6" text-anchor="middle">가장 많이 씀</text>

  <rect x="535" y="165" width="150" height="165" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="610" y="190" font-size="13" font-weight="700" fill="#1a7f37" text-anchor="middle">Resources</text>
  <text x="610" y="210" font-size="10" fill="#444" text-anchor="middle">동적 컨텍스트</text>
  <text x="610" y="228" font-size="10" fill="#444" text-anchor="middle">URI로 참조</text>
  <text x="610" y="256" font-size="9.5" fill="#6b6b6b" text-anchor="middle">계약서 템플릿·</text>
  <text x="610" y="272" font-size="9.5" fill="#6b6b6b" text-anchor="middle">용어 사전 같은 자료</text>
  <text x="610" y="308" font-size="9.5" fill="#9aa0a6" text-anchor="middle">읽어 붙이는 문서</text>

  <rect x="690" y="165" width="150" height="165" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="765" y="190" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">Prompts</text>
  <text x="765" y="210" font-size="10" fill="#444" text-anchor="middle">프롬프트 템플릿</text>
  <text x="765" y="228" font-size="10" fill="#444" text-anchor="middle">자주 쓰는 요청 묶음</text>
  <text x="765" y="256" font-size="9.5" fill="#6b6b6b" text-anchor="middle">"주간 매물 보고서"</text>
  <text x="765" y="272" font-size="9.5" fill="#6b6b6b" text-anchor="middle">한 번에 호출</text>
  <text x="765" y="308" font-size="9.5" fill="#9aa0a6" text-anchor="middle">단축키 같은 것</text>

  <rect x="40" y="365" width="820" height="40" rx="9" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="60" y="390" font-size="11.5" fill="#444">기획자가 챙길 핵심: 서버는 Tools·Resources·Prompts 셋만 노출하면 되고, 나머지 통신 규격은 프로토콜이 알아서 표준화합니다.</text>
</svg>
