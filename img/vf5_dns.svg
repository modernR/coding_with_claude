<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="880" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">도메인과 DNS — 이름이 서버로 연결되는 법</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">DNS는 도메인 이름을 IP 주소로 바꿔 주는 '전화번호부'입니다.</text>

  <defs><marker id="dn" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <g text-anchor="middle">
    <rect x="36" y="120" width="180" height="64" rx="10" fill="#eef3fd" stroke="#bcd0f5"/><text x="126" y="148" font-size="12.5" font-weight="700" fill="#3a6fd6">브라우저</text><text x="126" y="168" font-size="10.5" fill="#6b6b6b">rsvp.example.com 입력</text>
    <rect x="296" y="110" width="200" height="84" rx="12" fill="#1a1a1a"/><text x="396" y="138" font-size="13" font-weight="700" fill="#fff">DNS (전화번호부)</text><text x="396" y="160" font-size="10" fill="#cfcfcf">이름 → IP 변환</text><text x="396" y="178" font-size="10" fill="#cfcfcf">A·CNAME·MX·TXT 레코드</text>
    <rect x="576" y="120" width="180" height="64" rx="10" fill="#eaf6ee" stroke="#bfe3cb"/><text x="666" y="148" font-size="12.5" font-weight="700" fill="#1a7f37">서버/호스팅</text><text x="666" y="168" font-size="10.5" fill="#6b6b6b">예: Vercel IP</text>
  </g>
  <line x1="216" y1="152" x2="292" y2="152" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#dn)"/><text x="254" y="143" font-size="9.5" fill="#6b6b6b" text-anchor="middle">질의</text>
  <line x1="496" y1="152" x2="572" y2="152" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#dn)"/><text x="534" y="143" font-size="9.5" fill="#6b6b6b" text-anchor="middle">IP 응답</text>

  <rect x="36" y="216" width="808" height="66" rx="8" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="238" font-size="11.5" fill="#1a1a1a"><tspan font-weight="700">A</tspan> IPv4 주소  ·  <tspan font-weight="700">AAAA</tspan> IPv6  ·  <tspan font-weight="700">CNAME</tspan> 별칭(다른 도메인)  ·  <tspan font-weight="700">MX</tspan> 메일 서버  ·  <tspan font-weight="700">TXT</tspan> 검증(SPF·DKIM)</text>
  <text x="56" y="262" font-size="11" fill="#6b6b6b">예: rsvp.example.com → A → Vercel IP · www → CNAME → rsvp.example.com · @ → MX → Google Workspace</text>
  <text x="56" y="278" font-size="10.5" fill="#9aa0a6">※ Apex(example.com 자체)는 CNAME 불가 → A 레코드 사용.</text>
</svg>
