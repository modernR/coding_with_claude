<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="880" height="360" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">요청 한 번의 처리 흐름</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">버튼 한 번이 서버·DB를 거쳐 다시 화면으로 돌아오는 왕복.</text>

  <defs>
    <marker id="rq" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker>
  </defs>

  <rect x="36" y="140" width="150" height="70" rx="12" fill="#eef3fd" stroke="#bcd0f5"/><text x="111" y="170" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">브라우저</text><text x="111" y="190" font-size="10.5" fill="#6b6b6b" text-anchor="middle">(프론트엔드)</text>
  <rect x="270" y="140" width="170" height="70" rx="12" fill="#1a1a1a"/><text x="355" y="168" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">API 서버</text><text x="355" y="188" font-size="10.5" fill="#cfcfcf" text-anchor="middle">인증·검증·비즈니스 로직</text>
  <rect x="524" y="140" width="150" height="70" rx="12" fill="#eaf6ee" stroke="#bfe3cb"/><text x="599" y="170" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">데이터베이스</text><text x="599" y="190" font-size="10.5" fill="#6b6b6b" text-anchor="middle">저장·조회</text>
  <rect x="716" y="150" width="128" height="50" rx="10" fill="#fff7e6" stroke="#f3d488"/><text x="780" y="180" font-size="11.5" fill="#b8860b" text-anchor="middle">외부 API·캐시</text>

  <!-- 요청 -->
  <line x1="186" y1="162" x2="266" y2="162" stroke="#9aa0a6" stroke-width="2" marker-end="url(#rq)"/><text x="226" y="153" font-size="10" fill="#6b6b6b" text-anchor="middle">① 요청(HTTP)</text>
  <line x1="440" y1="162" x2="520" y2="162" stroke="#9aa0a6" stroke-width="2" marker-end="url(#rq)"/><text x="482" y="153" font-size="10" fill="#6b6b6b" text-anchor="middle">② 쿼리</text>
  <line x1="674" y1="175" x2="712" y2="175" stroke="#9aa0a6" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#rq)"/>
  <!-- 응답 -->
  <line x1="520" y1="190" x2="440" y2="190" stroke="#c98a95" stroke-width="2" marker-end="url(#rq)"/><text x="482" y="206" font-size="10" fill="#b00020" text-anchor="middle">③ 결과</text>
  <line x1="266" y1="190" x2="186" y2="190" stroke="#c98a95" stroke-width="2" marker-end="url(#rq)"/><text x="226" y="206" font-size="10" fill="#b00020" text-anchor="middle">④ 응답(JSON)</text>

  <text x="355" y="250" font-size="11.5" fill="#6b6b6b" text-anchor="middle">서버가 하는 일: 이 사람이 맞나(인증) → 권한 있나(인가) → 입력이 정상인가(검증) → 처리 → 결과 반환</text>
  <text x="40" y="300" font-size="12.5" fill="#1a1a1a">API = 프론트와 백엔드가 대화하는 '규칙과 창구'. 화면은 데이터를 <tspan font-weight="700">달라고 요청</tspan>할 뿐, 저장·판단은 서버가 합니다.</text>
  <text x="40" y="324" font-size="12" fill="#9aa0a6">※ 보안·정확성이 필요한 판단은 반드시 서버에서 — 브라우저 쪽 값은 사용자가 조작할 수 있기 때문.</text>
</svg>
