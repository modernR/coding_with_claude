<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">에이전트 간 통신 모델 — 메시지 허브 vs 공유 컨텍스트</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">표준은 메인=메시지 허브. 결과를 받아 다른 전문가에게 패스하고 충돌을 조정합니다.</text>

