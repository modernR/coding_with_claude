<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">정적 페이지 vs 동적 페이지</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">완성된 HTML을 그대로 주느냐, 틀만 주고 데이터를 채워 그리느냐의 차이.</text>
  <defs><marker id="sd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>
  <rect x="36" y="92" width="392" height="200" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="56" y="118" font-size="15" font-weight="700" fill="#1a7f37">정적(Static)</text>
  <text x="56" y="138" font-size="11" fill="#6b6b6b">서버가 처음부터 완성된 HTML을 보냄 · 누가 열든 같은 내용</text>
  <rect x="60" y="156" width="120" height="56" rx="8" fill="#ffffff" stroke="#cfe9d7"/><text x="120" y="182" font-size="11.5" fill="#1a1a1a" text-anchor="middle">서버</text><text x="120" y="199" font-size="10" fill="#6b6b6b" text-anchor="middle">완성 HTML 보관</text>
  <rect x="284" y="156" width="120" height="56" rx="8" fill="#ffffff" stroke="#cfe9d7"/><text x="344" y="182" font-size="11.5" fill="#1a1a1a" text-anchor="middle">브라우저</text><text x="344" y="199" font-size="10" fill="#6b6b6b" text-anchor="middle">받아서 바로 표시</text>
  <line x1="180" y1="184" x2="282" y2="184" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#sd)"/><text x="231" y="176" font-size="10" fill="#1a7f37" text-anchor="middle">완성 HTML</text>
  <text x="56" y="240" font-size="11" fill="#444">빠름 · 저렴 · SEO 유리</text>
  <text x="56" y="262" font-size="11" fill="#6b6b6b">회사 소개 · 블로그 · FAQ · 약관처럼 거의 안 바뀌는 화면</text>
  <rect x="472" y="92" width="392" height="200" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="492" y="118" font-size="15" font-weight="700" fill="#3a6fd6">동적(Dynamic)</text>
  <text x="492" y="138" font-size="11" fill="#6b6b6b">서버는 틀만 주고 데이터를 받아 그림 · 사용자·시간마다 다름</text>
  <rect x="496" y="156" width="104" height="56" rx="8" fill="#ffffff" stroke="#bcd0f5"/><text x="548" y="182" font-size="11" fill="#1a1a1a" text-anchor="middle">틀(빈 HTML)</text><text x="548" y="199" font-size="10" fill="#6b6b6b" text-anchor="middle">+ JS</text>
  <rect x="628" y="156" width="96" height="56" rx="8" fill="#fff7e6" stroke="#f3d488"/><text x="676" y="182" font-size="11" fill="#b8860b" text-anchor="middle">데이터 요청</text><text x="676" y="199" font-size="10" fill="#6b6b6b" text-anchor="middle">API·DB</text>
  <rect x="752" y="156" width="92" height="56" rx="8" fill="#ffffff" stroke="#bcd0f5"/><text x="798" y="182" font-size="11" fill="#1a1a1a" text-anchor="middle">화면 완성</text><text x="798" y="199" font-size="10" fill="#6b6b6b" text-anchor="middle">채워서 표시</text>
  <line x1="600" y1="184" x2="626" y2="184" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sd)"/>
  <line x1="724" y1="184" x2="750" y2="184" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sd)"/>
  <text x="492" y="240" font-size="11" fill="#444">사용자별 맞춤 · 실시간 반영</text>
  <text x="492" y="262" font-size="11" fill="#6b6b6b">받은편지함 · 타임라인 · 장바구니 · 대시보드처럼 수시로 바뀜</text>
</svg>
