<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">통신 방식(transport) 세 가지 — 어떻게 연결하나</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">같은 MCP 프로토콜이라도 물리적 연결 방식은 규모에 따라 달라집니다.</text>
  <g>
    <rect x="40" y="95" width="260" height="165" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
    <text x="60" y="122" font-size="15" font-weight="700" fill="#1a7f37">stdio</text>
    <text x="60" y="145" font-size="11" fill="#444">표준 입출력 · 로컬 프로세스</text>
    <text x="60" y="170" font-size="10.5" fill="#6b6b6b">가장 단순, 인프라 불필요</text>
    <rect x="60" y="188" width="220" height="52" rx="8" fill="#e8f6ec"/>
    <text x="70" y="208" font-size="10.5" fill="#1a7f37" font-weight="700">언제</text>
    <text x="70" y="226" font-size="10.5" fill="#444">첫 자체 MCP · 직원 개인 설치</text>
  </g>
  <g>
    <rect x="320" y="95" width="260" height="165" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
    <text x="340" y="122" font-size="15" font-weight="700" fill="#3a6fd6">HTTP/SSE</text>
    <text x="340" y="145" font-size="11" fill="#444">Server-Sent Events · 원격 서버</text>
    <text x="340" y="170" font-size="10.5" fill="#6b6b6b">중앙 서버로 다수가 함께</text>
    <rect x="340" y="188" width="220" height="52" rx="8" fill="#e3edfb"/>
    <text x="350" y="208" font-size="10.5" fill="#3a6fd6" font-weight="700">언제</text>
    <text x="350" y="226" font-size="10.5" fill="#444">사내 다수가 중앙 서버로 사용</text>
  </g>
  <g>
    <rect x="600" y="95" width="260" height="165" rx="12" fill="#fff7e6" stroke="#f3d488"/>
    <text x="620" y="122" font-size="15" font-weight="700" fill="#b8860b">WebSocket</text>
    <text x="620" y="145" font-size="11" fill="#444">실시간 양방향 (선택)</text>
    <text x="620" y="170" font-size="10.5" fill="#6b6b6b">특수 사례에 한정</text>
    <rect x="620" y="188" width="220" height="52" rx="8" fill="#faf3e0"/>
    <text x="630" y="208" font-size="10.5" fill="#b8860b" font-weight="700">언제</text>
    <text x="630" y="226" font-size="10.5" fill="#444">실시간성이 필요한 경우</text>
  </g>
  <text x="450" y="285" font-size="11" fill="#6b6b6b" text-anchor="middle">비개발자 회사의 첫 MCP는 보통 stdio로 시작해, 수요가 확인되면 HTTP/SSE로 넘어갑니다.</text>
</svg>
