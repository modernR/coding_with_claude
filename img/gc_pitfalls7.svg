<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="340" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">입문에서 자주 겪는 함정 7가지</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">이 일곱을 본인 입으로 설명할 수 있으면 입문 내용이 손에 정착한 것입니다.</text>

  <!-- row1 -->
  <rect x="40" y="92" width="266" height="72" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="115" font-size="11.5" font-weight="700" fill="#b00020">① OneDrive에 작업 폴더</text>
  <text x="56" y="135" font-size="9.5" fill="#444">동기화 충돌·경로 260자 초과</text>
  <text x="56" y="153" font-size="9.5" fill="#1a7f37">→ C:\dev\ 짧은 경로</text>

  <rect x="317" y="92" width="266" height="72" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="333" y="115" font-size="11.5" font-weight="700" fill="#b00020">② 권한 너무 넓게</text>
  <text x="333" y="135" font-size="9.5" fill="#444">"Allow always" 남용</text>
  <text x="333" y="153" font-size="9.5" fill="#1a7f37">→ rm엔 절대 always 금지</text>

  <rect x="594" y="92" width="266" height="72" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="610" y="115" font-size="11.5" font-weight="700" fill="#b00020">③ CLAUDE.md 없음</text>
  <text x="610" y="135" font-size="9.5" fill="#444">매번 같은 설명 반복</text>
  <text x="610" y="153" font-size="9.5" fill="#1a7f37">→ /init로 한 번 생성</text>

  <!-- row2 -->
  <rect x="40" y="176" width="266" height="72" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="199" font-size="11.5" font-weight="700" fill="#b00020">④ .env를 Git에 커밋</text>
  <text x="56" y="219" font-size="9.5" fill="#444">API 키 유출·비용 폭탄</text>
  <text x="56" y="237" font-size="9.5" fill="#1a7f37">→ .gitignore에 .env</text>

  <rect x="317" y="176" width="266" height="72" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="333" y="199" font-size="11.5" font-weight="700" fill="#b00020">⑤ RLS 미설정·anon 누락</text>
  <text x="333" y="219" font-size="9.5" fill="#444">누구나 읽고 쓰거나, 못 읽음</text>
  <text x="333" y="237" font-size="9.5" fill="#1a7f37">→ RLS 켜고 anon 명시</text>

  <rect x="594" y="176" width="266" height="72" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="610" y="199" font-size="11.5" font-weight="700" fill="#b00020">⑥ Vercel 환경변수 누락</text>
  <text x="610" y="219" font-size="9.5" fill="#444">로컬은 되는데 배포는 실패</text>
  <text x="610" y="237" font-size="9.5" fill="#1a7f37">→ 배포 후 첫 점검 항목</text>

  <!-- row3 single -->
  <rect x="40" y="260" width="543" height="60" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="284" font-size="11.5" font-weight="700" fill="#b00020">⑦ 인스타 비즈니스 전환을 당일에</text>
  <text x="56" y="306" font-size="9.5" fill="#444">모바일 전용·Facebook 페이지 연결 필요 → 계정·토큰을 미리 준비</text>

  <rect x="594" y="260" width="266" height="60" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="610" y="284" font-size="11" font-weight="700" fill="#1a7f37">공통 교훈</text>
  <text x="610" y="306" font-size="9.5" fill="#444">권한·비밀·경로·정책을 먼저 챙긴다</text>
</svg>
