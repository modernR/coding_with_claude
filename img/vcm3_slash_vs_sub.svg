<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">서브에이전트 vs 슬래시 명령 — 언제 무엇을 고르나</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">같은 작업도 둘 다로 가능합니다. 크기·대화 의존성·병렬 여부로 갈립니다.</text>

  <!-- slash -->
  <rect x="40" y="90" width="390" height="215" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="235" y="118" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">슬래시 명령 (스킬)</text>
  <text x="235" y="139" font-size="10.5" fill="#6b6b6b" text-anchor="middle">메인 컨텍스트 안에서 실행 · 대화 히스토리 공유</text>
  <text x="62" y="168" font-size="10.5" fill="#444">✓ 작은 작업 (파일 1~2개)</text>
  <text x="62" y="190" font-size="10.5" fill="#444">✓ 앞 대화 참조 필요 ("위 함수 수정해줘")</text>
  <text x="62" y="212" font-size="10.5" fill="#444">✓ 실시간 상호작용 (결과 보고 즉시 후속)</text>
  <text x="62" y="234" font-size="10.5" fill="#444">✓ 이전 대화와 강한 의존성</text>
  <text x="62" y="256" font-size="10.5" fill="#444">✕ 병렬 불가 (순차만)</text>
  <rect x="62" y="270" width="346" height="26" rx="6" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="72" y="288" font-size="9.5" fill="#6b6b6b">예: /type-hint-fixer — 즉시 대화에 반영, 후속 요청 가능</text>

  <!-- sub -->
  <rect x="470" y="90" width="390" height="215" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="665" y="118" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">서브에이전트</text>
  <text x="665" y="139" font-size="10.5" fill="#6b6b6b" text-anchor="middle">격리된 새 컨텍스트 · 대화 히스토리 비공유</text>
  <text x="492" y="168" font-size="10.5" fill="#444">✓ 큰 작업 (파일 5개 이상)</text>
  <text x="492" y="190" font-size="10.5" fill="#444">✓ 메인과 컨텍스트 분리 필요</text>
  <text x="492" y="212" font-size="10.5" fill="#444">✓ 병렬 처리 필요 (여러 서브 동시)</text>
  <text x="492" y="234" font-size="10.5" fill="#444">✓ 토큰 효율 중요 (대용량 PR·리팩토링)</text>
  <text x="492" y="256" font-size="10.5" fill="#444">✕ 오버헤드 약간 있음 · 완료 후 결과 수신</text>
  <rect x="492" y="270" width="346" height="26" rx="6" fill="#ffffff" stroke="#cfe9d7"/>
  <text x="502" y="288" font-size="9.5" fill="#6b6b6b">예: 20개 파일 PR — 서브가 깊게 검토, 메인은 가볍게</text>

  <!-- decision -->
  <rect x="40" y="320" width="820" height="60" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="344" font-size="11.5" font-weight="700" fill="#1a1a1a">의사결정 요약</text>
  <text x="56" y="365" font-size="10.5" fill="#444">파일 5개 미만 + 강한 대화 의존 → 슬래시    |    파일 5개 이상 + 명확한 도메인 분리 → 서브    |    여러 검토자 병렬 → 서브 여럿</text>
</svg>
