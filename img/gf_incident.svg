  <line x1="530" y1="146" x2="548" y2="146" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#in)"/>
  <line x1="700" y1="146" x2="718" y2="146" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#in)"/>
  <text x="40" y="228" font-size="12" fill="#6b6b6b">※ 미리 정해 두는 지표 — RTO(복구 목표 시간) · RPO(허용 데이터 손실) · SLA(가용성 약정, 예 99.9% = 월 43분 용인).</text>
