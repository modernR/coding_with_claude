<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">훅 + 확장 기능 조합 — 훅은 트리거, 나머지가 작업</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">훅이 "언제"를 담당하고, MCP·서브에이전트·CLAUDE.md가 "무엇을"을 맡습니다.</text>

  <defs><marker id="gm4hc" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- combo 1 -->
  <rect x="40" y="100" width="150" height="56" rx="9" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="115" y="124" font-size="11" font-weight="700" fill="#b8860b" text-anchor="middle">PostToolUse</text>
  <text x="115" y="143" font-size="9.5" fill="#6b6b6b" text-anchor="middle">파일 저장 감지</text>
  <line x1="190" y1="128" x2="228" y2="128" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm4hc)"/>
  <rect x="232" y="100" width="150" height="56" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="307" y="124" font-size="11" font-weight="700" fill="#3a6fd6" text-anchor="middle">MCP (http)</text>
  <text x="307" y="143" font-size="9.5" fill="#6b6b6b" text-anchor="middle">슬랙 알림 발송</text>

  <!-- combo 2 -->
  <rect x="40" y="172" width="150" height="56" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="115" y="196" font-size="10.5" font-weight="700" fill="#b00020" text-anchor="middle">PostToolUseFailure</text>
  <text x="115" y="215" font-size="9.5" fill="#6b6b6b" text-anchor="middle">실행 실패 감지</text>
  <line x1="190" y1="200" x2="228" y2="200" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm4hc)"/>
  <rect x="232" y="172" width="150" height="56" rx="9" fill="#ede9fe" stroke="#a78bda"/>
  <text x="307" y="196" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">서브에이전트</text>
  <text x="307" y="215" font-size="9.5" fill="#6b6b6b" text-anchor="middle">에러 자동 분석</text>

  <!-- combo 3 -->
  <rect x="40" y="244" width="150" height="46" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="115" y="264" font-size="10" font-weight="700" fill="#1a7f37" text-anchor="middle">InstructionsLoaded</text>
  <text x="115" y="281" font-size="9.5" fill="#6b6b6b" text-anchor="middle">규칙 로드 감지</text>
  <line x1="190" y1="267" x2="228" y2="267" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm4hc)"/>
  <rect x="232" y="244" width="150" height="46" rx="9" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="307" y="264" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">CLAUDE.md</text>
  <text x="307" y="281" font-size="9.5" fill="#6b6b6b" text-anchor="middle">규칙 일관성 검증</text>

  <rect x="430" y="100" width="430" height="190" rx="12" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="645" y="130" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">분업의 원리</text>
  <text x="645" y="162" font-size="11.5" fill="#444" text-anchor="middle">훅 = "실패 감지" 같은 트리거 담당</text>
  <text x="645" y="188" font-size="11.5" fill="#444" text-anchor="middle">확장 기능 = 실제 작업(분석·알림·검증) 담당</text>
  <rect x="452" y="212" width="386" height="58" rx="8" fill="#fff7e6" stroke="#f3d488"/>
  <text x="645" y="236" font-size="10.5" fill="#8a6d00" text-anchor="middle">단독으로 쓸 때보다 조합할 때</text>
  <text x="645" y="256" font-size="10.5" fill="#8a6d00" text-anchor="middle">훅의 진짜 힘이 드러납니다</text>
</svg>
