<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">OAuth 로그인 흐름 — 익명 RSVP의 한계를 넘어</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">"누가 신청했는지"를 신뢰할 수 있어야 본인 취소·이력 조회·중복 방지가 가능합니다.</text>

  <defs>
    <marker id="vcm6o_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- actors -->
  <rect x="40" y="110" width="150" height="54" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="115" y="134" font-size="12" font-weight="700" fill="#3a6fd6" text-anchor="middle">사용자 브라우저</text>
  <text x="115" y="152" font-size="9.5" fill="#444" text-anchor="middle">/login 페이지</text>

  <rect x="375" y="110" width="150" height="54" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="450" y="134" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">Supabase Auth</text>
  <text x="450" y="152" font-size="9.5" fill="#444" text-anchor="middle">세션·JWT 발급</text>

  <rect x="710" y="110" width="150" height="54" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="785" y="134" font-size="12" font-weight="700" fill="#b8860b" text-anchor="middle">OAuth Provider</text>
  <text x="785" y="152" font-size="9.5" fill="#444" text-anchor="middle">Google · GitHub</text>

  <!-- flow arrows -->
  <line x1="190" y1="130" x2="371" y2="130" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#vcm6o_arr)"/>
  <text x="280" y="122" font-size="9.5" fill="#6b6b6b" text-anchor="middle">① 로그인 버튼 클릭</text>
  <line x1="525" y1="126" x2="706" y2="126" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#vcm6o_arr)"/>
  <text x="615" y="118" font-size="9.5" fill="#6b6b6b" text-anchor="middle">② Provider로 리다이렉트</text>
  <line x1="706" y1="146" x2="525" y2="146" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#vcm6o_arr)"/>
  <text x="615" y="163" font-size="9.5" fill="#6b6b6b" text-anchor="middle">③ 동의 → 인가 코드</text>

  <!-- callback -->
  <rect x="375" y="200" width="150" height="50" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="450" y="222" font-size="11" font-weight="700" fill="#7c3aed" text-anchor="middle">/auth/callback</text>
  <text x="450" y="240" font-size="9" fill="#444" text-anchor="middle">코드 → 세션 교환</text>
  <line x1="450" y1="164" x2="450" y2="198" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#vcm6o_arr)"/>
  <text x="540" y="186" font-size="9" fill="#6b6b6b">④ 콜백</text>

  <!-- middleware -->
  <rect x="115" y="200" width="200" height="50" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="215" y="222" font-size="11" font-weight="700" fill="#1a1a1a" text-anchor="middle">middleware.ts</text>
  <text x="215" y="240" font-size="9" fill="#444" text-anchor="middle">세션 확인 · 미로그인 → /login</text>
  <path d="M375,225 L319,225" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#vcm6o_arr)"/>
  <text x="345" y="215" font-size="9" fill="#6b6b6b" text-anchor="middle">⑤ 세션</text>

  <!-- result -->
  <rect x="40" y="285" width="820" height="70" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="56" y="309" font-size="12" font-weight="700" fill="#1a7f37">로그인 후 열리는 것</text>
  <text x="56" y="331" font-size="10.5" fill="#444">· 이벤트 상세는 공개 유지, RSVP 제출만 로그인 필요   · participants 행에 user_id 기록 → auth.uid()로 본인 식별</text>
  <text x="56" y="349" font-size="10.5" fill="#444">· RLS로 본인 행만 취소/수정   · 신청 이력 조회 · 중복 신청 차단 · 확인 메일 발송이 가능해짐</text>
</svg>
