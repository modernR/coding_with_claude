<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">MCP 메타데이터 비용 — MCP가 늘수록 컨텍스트가 먼저 줄어든다</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">각 MCP는 활성화만으로 자기 도구·리소스 정보를 컨텍스트에 싣습니다. 도구 1개당 평균 200~500 토큰.</text>
  <defs>
    <marker id="vcm5cost_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>
  <rect x="40" y="100" width="260" height="150" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="170" y="128" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">MCP 5개</text>
  <rect x="70" y="145" width="200" height="80" rx="8" fill="#ffffff" stroke="#cfe9d7"/>
  <rect x="70" y="145" width="10" height="80" rx="3" fill="#1a7f37"/>
  <text x="180" y="180" font-size="12" fill="#444" text-anchor="middle">메타데이터 ~10K</text>
  <text x="180" y="204" font-size="19" font-weight="700" fill="#1a7f37" text-anchor="middle">컨텍스트 1%</text>
  <text x="170" y="243" font-size="10.5" fill="#6b6b6b" text-anchor="middle">여유롭게 운용</text>
  <rect x="320" y="100" width="260" height="150" rx="12" fill="#fff7e6" stroke="#f3d488"/>
  <text x="450" y="128" font-size="14" font-weight="700" fill="#b8860b" text-anchor="middle">MCP 15개</text>
  <rect x="350" y="145" width="200" height="80" rx="8" fill="#ffffff" stroke="#f3d488"/>
  <rect x="350" y="145" width="50" height="80" rx="3" fill="#b8860b"/>
  <text x="460" y="180" font-size="12" fill="#444" text-anchor="middle">메타데이터 ~50K</text>
  <text x="460" y="204" font-size="19" font-weight="700" fill="#b8860b" text-anchor="middle">컨텍스트 5%</text>
  <text x="450" y="243" font-size="10.5" fill="#6b6b6b" text-anchor="middle">여기까지는 무난</text>
  <rect x="600" y="100" width="260" height="150" rx="12" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="730" y="128" font-size="14" font-weight="700" fill="#b00020" text-anchor="middle">MCP 30개</text>
  <rect x="630" y="145" width="200" height="80" rx="8" fill="#ffffff" stroke="#f3c9cf"/>
  <rect x="630" y="145" width="150" height="80" rx="3" fill="#b00020"/>
  <text x="730" y="180" font-size="12" fill="#fff" text-anchor="middle">메타데이터 ~150K</text>
  <text x="730" y="204" font-size="19" font-weight="700" fill="#fff" text-anchor="middle">컨텍스트 15%</text>
  <text x="730" y="243" font-size="10.5" fill="#b00020" text-anchor="middle">시작부터 15% 소진·품질 저하</text>
  <line x1="300" y1="175" x2="318" y2="175" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vcm5cost_arr)"/>
  <line x1="580" y1="175" x2="598" y2="175" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vcm5cost_arr)"/>
  <rect x="40" y="285" width="820" height="90" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="60" y="313" font-size="13" font-weight="700" fill="#1a1a1a">읽는 법</text>
  <text x="60" y="338" font-size="11.5" fill="#444">빨간 막대는 "일도 하기 전에 이미 채워진 컨텍스트"입니다. 대화·파일·규칙을 담을 공간이 그만큼 줄어듭니다.</text>
  <text x="60" y="360" font-size="11.5" fill="#444">15개 안팎이 실무 상한선이며, 그 이상은 항상 켜기보다 프로젝트·세션별로 골라 켜는 편이 낫습니다.</text>
</svg>
