<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <defs><marker id="mrl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">모듈형 룰 시스템 — 짧은 진입점 + 필요한 룰만 로드</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">큰 CLAUDE.md 하나에 다 담으면 매 세션 컨텍스트를 낭비합니다. 조각으로 나눠 임포트합니다.</text>

  <rect x="40" y="100" width="290" height="250" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="126" font-size="13" font-weight="700" fill="#3a6fd6">CLAUDE.md (진입점)</text>
  <text x="60" y="147" font-size="10.5" fill="#6b6b6b">300단어 이내 · 매 세션 항상 로드</text>
  <g font-size="11" fill="#444">
    <text x="60" y="176">프로젝트 한 줄 정의</text>
    <text x="60" y="200">핵심 기술 스택</text>
    <text x="60" y="224">룰 파일 임포트 목록</text>
  </g>
  <rect x="60" y="240" width="250" height="90" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="74" y="262" font-size="10" fill="#7c3aed">@.claude/rules/02_code-style.md</text>
  <text x="74" y="282" font-size="10" fill="#7c3aed">@.claude/rules/04_security.md</text>
  <text x="74" y="308" font-size="9.5" fill="#6b6b6b">작업 전 관련 룰만 읽고 시작</text>

  <line x1="330" y1="225" x2="375" y2="225" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#mrl)"/>

  <rect x="380" y="100" width="480" height="250" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="400" y="126" font-size="13" font-weight="700" fill="#1a1a1a">.claude/rules/  (영역별 분할)</text>
  <g font-size="11" fill="#444">
    <text x="400" y="156">01_tech-stack.md — 기술 스택·버전</text>
    <text x="400" y="182">02_code-style.md — 코드 스타일</text>
    <text x="400" y="208">03_naming.md — 네이밍 규칙</text>
    <text x="400" y="234">04_security.md — 보안 규칙</text>
    <text x="400" y="260">05_testing.md — 테스트 규칙</text>
    <text x="400" y="286">06_review-checklist.md — PR 리뷰 체크</text>
  </g>
  <text x="400" y="322" font-size="10.5" fill="#1a7f37">필요한 룰만 그때그때 로드 → 컨텍스트 효율 극대화</text>
</svg>
