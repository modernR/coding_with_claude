<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">MCP·스킬·커맨드·플러그인 — 확장의 네 조각</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">외부로는 MCP(어댑터), 안으로는 스킬(절차서)·커맨드(단축키), 이들을 묶으면 플러그인.</text>

  <defs><marker id="ms" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- MCP adapter -->
  <text x="40" y="102" font-size="13" font-weight="700" fill="#1a7f37">MCP — 외부 서비스로의 범용 어댑터</text>
  <rect x="40" y="114" width="130" height="60" rx="9" fill="#1a1a1a"/><text x="105" y="140" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">에이전트</text><text x="105" y="158" font-size="9.5" fill="#cfcfcf" text-anchor="middle">Code / Cowork</text>
  <line x1="170" y1="144" x2="206" y2="144" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#ms)"/>
  <rect x="210" y="114" width="110" height="60" rx="9" fill="#f1faf3" stroke="#cfe9d7"/><text x="265" y="140" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">MCP</text><text x="265" y="158" font-size="9.5" fill="#6b6b6b" text-anchor="middle">표준 규격</text>
  <line x1="320" y1="144" x2="356" y2="144" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#ms)"/>
  <g font-size="10" fill="#1a1a1a" text-anchor="middle">
    <rect x="360" y="112" width="120" height="26" rx="6" fill="#fafbfc" stroke="#e3e6ea"/><text x="420" y="129">Notion · Slack</text>
    <rect x="360" y="142" width="120" height="26" rx="6" fill="#fafbfc" stroke="#e3e6ea"/><text x="420" y="159">GitHub · Supabase</text>
    <rect x="490" y="112" width="120" height="26" rx="6" fill="#fafbfc" stroke="#e3e6ea"/><text x="550" y="129">Gmail · Drive</text>
    <rect x="490" y="142" width="120" height="26" rx="6" fill="#fafbfc" stroke="#e3e6ea"/><text x="550" y="159">Stripe · DB…</text>
  </g>
  <rect x="628" y="112" width="232" height="62" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="644" y="134" font-size="10.5" font-weight="700" fill="#b00020">주의</text>
  <text x="644" y="153" font-size="10" fill="#444">30개씩 켜두면 메타데이터만으로</text>
  <text x="644" y="168" font-size="10" fill="#444">컨텍스트 5%를 시작부터 소모</text>

  <!-- skill vs command -->
  <rect x="40" y="200" width="400" height="86" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="226" font-size="13" font-weight="700" fill="#3a6fd6">스킬 (Skill) — 작업 절차서(SOP)</text>
  <text x="60" y="248" font-size="10.5" fill="#444">"어떻게 하는가"의 도메인 지식. SKILL.md로 패키지화.</text>
  <text x="60" y="268" font-size="10.5" fill="#444">자연어에서 자동 감지 또는 /skill 호출. 조직 노하우의 자산화.</text>

  <rect x="460" y="200" width="400" height="86" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="480" y="226" font-size="13" font-weight="700" fill="#b8860b">커스텀 커맨드 — 단축키</text>
  <text x="480" y="248" font-size="10.5" fill="#444">"무엇을 할 것인가"의 워크플로우. /주간보고 처럼 호출.</text>
  <text x="480" y="268" font-size="10.5" fill="#444">변수·복합 단계 가능. 커맨드 안에서 스킬을 부르기도 함.</text>

  <!-- plugin -->
  <rect x="40" y="304" width="820" height="76" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="60" y="330" font-size="13" font-weight="700" fill="#1a1a1a">플러그인 (Plugin) = 스킬 + 커맨드 + MCP 묶음</text>
  <text x="60" y="352" font-size="11" fill="#444">한 도메인(예: 한국형 비즈니스 자동화)에 맞춘 자산 한 세트. 마켓플레이스에서 검색·설치·공유.</text>
  <text x="60" y="371" font-size="11" fill="#1a7f37">사내 마켓플레이스로 배포하면 모든 직원이 같은 자동화 패턴 사용 → "AI 도입"에서 "AI 조직화"로.</text>
</svg>
