<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">상태(state)가 바뀌면 화면이 자동으로 다시 그려진다</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">개발자는 화면을 직접 고쳐 그리지 않고 '값(state)'만 바꿉니다.</text>
  <defs><marker id="st" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>
  <rect x="60" y="120" width="200" height="90" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="160" y="150" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">상태(state)</text>
  <text x="160" y="176" font-size="12" fill="#444" text-anchor="middle">참여자 수 = 44</text>
  <text x="160" y="196" font-size="11" fill="#6b6b6b" text-anchor="middle">화면이 기억하는 값</text>
  <text x="360" y="110" font-size="11.5" fill="#E8344E" text-anchor="middle">사용자가 '신청하기' 클릭</text>
  <rect x="300" y="120" width="120" height="42" rx="8" fill="#fdeef1" stroke="#f7c0c8"/>
  <text x="360" y="146" font-size="11.5" fill="#E8344E" text-anchor="middle">44 → 45로 변경</text>
  <line x1="260" y1="141" x2="298" y2="141" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#st)"/>
  <rect x="300" y="176" width="120" height="34" rx="8" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="360" y="198" font-size="11" fill="#1a7f37" text-anchor="middle">자동 재렌더</text>
  <line x1="360" y1="162" x2="360" y2="174" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#st)"/>
  <rect x="640" y="112" width="200" height="106" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="740" y="140" font-size="13" font-weight="700" fill="#3a6fd6" text-anchor="middle">화면(UI)</text>
  <rect x="662" y="154" width="156" height="46" rx="7" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="740" y="176" font-size="12" fill="#1a1a1a" text-anchor="middle">참여자 45명</text>
  <text x="740" y="193" font-size="10.5" fill="#1a7f37" text-anchor="middle">버튼: 신청 → 취소</text>
  <line x1="420" y1="193" x2="638" y2="180" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#st)"/>
  <text x="530" y="176" font-size="10.5" fill="#6b6b6b" text-anchor="middle">관련 화면만 다시 그림</text>
  <text x="40" y="266" font-size="12" fill="#6b6b6b">※ React·Vue의 핵심 원리 — DOM을 손으로 고치는 대신, 상태를 바꾸면 프레임워크가 알아서 화면을 맞춰 줍니다.</text>
</svg>
