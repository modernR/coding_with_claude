<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">훅 이벤트 라이프사이클 — 세션 시작부터 종료까지</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">실선 = 핵심 흐름, 점선 = 부속 이벤트. PreToolUse·PostToolUse가 가장 자주 쓰입니다.</text>

  <defs><marker id="m4lc_ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- session start / instructions / prompt (blue) -->
  <rect x="40" y="95" width="150" height="42" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="115" y="121" font-size="11" font-weight="700" fill="#3a6fd6" text-anchor="middle">SessionStart</text>
  <rect x="205" y="95" width="160" height="42" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="285" y="115" font-size="10.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">InstructionsLoaded</text>
  <text x="285" y="130" font-size="9" fill="#6b6b6b" text-anchor="middle">CLAUDE.md·규칙 로드</text>
  <rect x="380" y="95" width="160" height="42" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="460" y="115" font-size="10.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">UserPromptSubmit</text>
  <text x="460" y="130" font-size="9" fill="#6b6b6b" text-anchor="middle">프롬프트 제출</text>

  <line x1="190" y1="116" x2="203" y2="116" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>
  <line x1="365" y1="116" x2="378" y2="116" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>

  <!-- PreToolUse gate (red) -->
  <rect x="380" y="160" width="160" height="52" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="460" y="184" font-size="11.5" font-weight="700" fill="#b00020" text-anchor="middle">PreToolUse</text>
  <text x="460" y="201" font-size="9" fill="#6b6b6b" text-anchor="middle">실행 전 관문 (allow / deny)</text>
  <line x1="460" y1="137" x2="460" y2="158" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>

  <!-- deny branch -->
  <rect x="600" y="160" width="120" height="52" rx="9" fill="#b00020"/>
  <text x="660" y="190" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">차단 (deny)</text>
  <line x1="540" y1="186" x2="598" y2="186" stroke="#b00020" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>
  <text x="569" y="177" font-size="8.5" fill="#b00020" text-anchor="middle">deny</text>

  <!-- Tool execution (amber) -->
  <rect x="380" y="235" width="160" height="46" rx="9" fill="#fff7e6" stroke="#f3d488"/>
  <text x="460" y="263" font-size="11.5" font-weight="700" fill="#b8860b" text-anchor="middle">도구 실행 (Tool)</text>
  <line x1="460" y1="212" x2="460" y2="233" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>
  <text x="475" y="228" font-size="8.5" fill="#1a7f37">allow</text>

  <!-- Post success / failure -->
  <rect x="245" y="304" width="200" height="46" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="345" y="326" font-size="11" font-weight="700" fill="#1a7f37" text-anchor="middle">PostToolUse (성공)</text>
  <text x="345" y="342" font-size="9" fill="#6b6b6b" text-anchor="middle">자동 lint·테스트·변경 감지</text>
  <rect x="470" y="304" width="200" height="46" rx="9" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="570" y="326" font-size="11" font-weight="700" fill="#b8860b" text-anchor="middle">PostToolUseFailure</text>
  <text x="570" y="342" font-size="9" fill="#6b6b6b" text-anchor="middle">에러 자동 분석·재시도</text>
  <line x1="430" y1="281" x2="360" y2="302" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>
  <line x1="490" y1="281" x2="558" y2="302" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>

  <!-- Notification / Stop / SessionEnd (blue) -->
  <rect x="700" y="304" width="160" height="46" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="780" y="326" font-size="10.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">Notification → Stop</text>
  <text x="780" y="342" font-size="9" fill="#6b6b6b" text-anchor="middle">알림·응답 완료</text>
  <line x1="670" y1="327" x2="698" y2="327" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>

  <rect x="700" y="235" width="160" height="42" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="780" y="261" font-size="11" font-weight="700" fill="#3a6fd6" text-anchor="middle">SessionEnd</text>
  <text x="780" y="275" font-size="8.5" fill="#6b6b6b" text-anchor="middle"></text>
  <line x1="780" y1="302" x2="780" y2="279" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4lc_ar)"/>

  <!-- 부속 이벤트 점선 -->
  <rect x="40" y="304" width="180" height="72" rx="9" fill="#fafbfc" stroke="#e3e6ea" stroke-dasharray="4 3"/>
  <text x="130" y="325" font-size="10" font-weight="700" fill="#6b6b6b" text-anchor="middle">부속 이벤트 (점선)</text>
  <text x="55" y="343" font-size="9" fill="#444">SubagentStart / SubagentStop</text>
  <text x="55" y="358" font-size="9" fill="#444">PermissionRequest · ConfigChange</text>
  <text x="55" y="373" font-size="9" fill="#444">WorktreeCreate / Remove · Elicitation</text>
</svg>
