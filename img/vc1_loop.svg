<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">에이전틱 루프 — 지시 한 번에 안에서 도는 사이클</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">사용자가 한 번 지시하면, 에이전트는 이 세 단계를 완료할 때까지 반복합니다.</text>

  <defs>
    <marker id="lp" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#3a6fd6"/></marker>
  </defs>

  <!-- 사용자 지시 -->
  <rect x="40" y="180" width="120" height="56" rx="10" fill="#1a1a1a"/><text x="100" y="205" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">사용자 지시</text><text x="100" y="223" font-size="10" fill="#cfcfcf" text-anchor="middle">"~해줘"</text>
  <line x1="160" y1="208" x2="236" y2="208" stroke="#3a6fd6" stroke-width="1.8" marker-end="url(#lp)"/>

  <!-- Reason -->
  <rect x="240" y="150" width="150" height="116" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="315" y="180" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">① Reason</text>
  <text x="315" y="200" font-size="11" fill="#1a1a1a" text-anchor="middle">추론 · 판단</text>
  <text x="315" y="222" font-size="9.5" fill="#6b6b6b" text-anchor="middle">지금 상태를 보고</text>
  <text x="315" y="236" font-size="9.5" fill="#6b6b6b" text-anchor="middle">다음에 무엇을 할지,</text>
  <text x="315" y="250" font-size="9.5" fill="#6b6b6b" text-anchor="middle">어떤 도구를 쓸지 결정</text>

  <!-- Tool Call -->
  <rect x="440" y="150" width="150" height="116" rx="12" fill="#fff7e6" stroke="#f3d488"/>
  <text x="515" y="180" font-size="14" font-weight="700" fill="#b8860b" text-anchor="middle">② Tool Call</text>
  <text x="515" y="200" font-size="11" fill="#1a1a1a" text-anchor="middle">도구 실행</text>
  <text x="515" y="222" font-size="9.5" fill="#6b6b6b" text-anchor="middle">파일 읽기·명령어·</text>
  <text x="515" y="236" font-size="9.5" fill="#6b6b6b" text-anchor="middle">API 호출을 실제로 수행</text>
  <text x="515" y="250" font-size="9.5" fill="#6b6b6b" text-anchor="middle">(여러 개 병렬 가능)</text>

  <!-- Observe -->
  <rect x="640" y="150" width="150" height="116" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="715" y="180" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">③ Observe</text>
  <text x="715" y="200" font-size="11" fill="#1a1a1a" text-anchor="middle">결과 관찰</text>
  <text x="715" y="222" font-size="9.5" fill="#6b6b6b" text-anchor="middle">실행 결과를 수집해</text>
  <text x="715" y="236" font-size="9.5" fill="#6b6b6b" text-anchor="middle">컨텍스트에 더하고</text>
  <text x="715" y="250" font-size="9.5" fill="#6b6b6b" text-anchor="middle">다시 ①로 돌아감</text>

  <line x1="390" y1="208" x2="436" y2="208" stroke="#3a6fd6" stroke-width="1.8" marker-end="url(#lp)"/>
  <line x1="590" y1="208" x2="636" y2="208" stroke="#3a6fd6" stroke-width="1.8" marker-end="url(#lp)"/>

  <!-- loop back arrow -->
  <path d="M715 266 L715 320 L315 320 L315 266" fill="none" stroke="#3a6fd6" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#lp)"/>
  <text x="515" y="313" font-size="10.5" fill="#3a6fd6" text-anchor="middle">작업이 끝날 때까지 반복 (보통 5~10회)</text>

  <!-- stop -->
  <rect x="40" y="346" width="820" height="34" rx="8" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="368" font-size="11.5" fill="#1a1a1a">멈추는 순간: 계획한 작업 완료 · 사용자가 "됐어"로 종료 · 복구 불가능한 오류. 중요한 변경 전에는 Plan 모드/권한 창으로 사람을 끼워 넣습니다.</text>
</svg>
