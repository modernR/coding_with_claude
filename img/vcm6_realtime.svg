<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">Realtime 구독 — DB 변경을 화면에 즉시 반영</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">한 사용자의 신청이 다른 사용자 화면의 참가자 명단에 바로 나타납니다.</text>

  <defs>
    <marker id="vcm6rt_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- writer -->
  <rect x="40" y="110" width="160" height="70" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="120" y="138" font-size="12" font-weight="700" fill="#3a6fd6" text-anchor="middle">사용자 A</text>
  <text x="120" y="158" font-size="9.5" fill="#444" text-anchor="middle">RSVP 신청(INSERT)</text>
  <text x="120" y="172" font-size="9.5" fill="#444" text-anchor="middle">participants 행 추가</text>

  <!-- DB -->
  <rect x="330" y="95" width="240" height="100" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="450" y="122" font-size="13" font-weight="700" fill="#1a7f37" text-anchor="middle">Supabase Postgres</text>
  <text x="450" y="145" font-size="10" fill="#444" text-anchor="middle">participants 테이블</text>
  <text x="450" y="164" font-size="10" fill="#444" text-anchor="middle">Replication 활성 (Realtime)</text>
  <text x="450" y="182" font-size="9.5" fill="#6b6b6b" text-anchor="middle">변경을 이벤트로 방송(broadcast)</text>

  <!-- subscribers -->
  <rect x="700" y="95" width="160" height="55" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="780" y="119" font-size="11.5" font-weight="700" fill="#7c3aed" text-anchor="middle">사용자 B 화면</text>
  <text x="780" y="137" font-size="9" fill="#444" text-anchor="middle">명단 자동 갱신</text>
  <rect x="700" y="160" width="160" height="55" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="780" y="184" font-size="11.5" font-weight="700" fill="#7c3aed" text-anchor="middle">주최자 대시보드</text>
  <text x="780" y="202" font-size="9" fill="#444" text-anchor="middle">신청 수 실시간 반영</text>

  <line x1="200" y1="145" x2="326" y2="145" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6rt_arr)"/>
  <text x="263" y="137" font-size="9" fill="#6b6b6b" text-anchor="middle">① 쓰기</text>
  <line x1="570" y1="130" x2="696" y2="125" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6rt_arr)"/>
  <line x1="570" y1="160" x2="696" y2="182" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6rt_arr)"/>
  <text x="640" y="158" font-size="9" fill="#6b6b6b" text-anchor="middle">② push</text>

  <!-- client code note -->
  <rect x="40" y="240" width="820" height="100" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="264" font-size="12" font-weight="700" fill="#1a1a1a">클라이언트 구독의 뼈대</text>
  <text x="56" y="288" font-size="10.5" fill="#444">· <tspan font-family="monospace">channel('participants-changes')</tspan> 로 채널 개설 → <tspan font-family="monospace">on('postgres_changes', { table, filter: event_id })</tspan></text>
  <text x="56" y="309" font-size="10.5" fill="#444">· 콜백에서 화면 갱신(예: <tspan font-family="monospace">router.refresh()</tspan>)   · 컴포넌트 언마운트 시 <tspan font-family="monospace">removeChannel</tspan> 로 구독 해제(누수 방지)</text>
  <text x="56" y="330" font-size="10.5" fill="#6b6b6b">필터로 "이 이벤트의 변경만" 받으면 불필요한 트래픽을 줄입니다.</text>
</svg>
