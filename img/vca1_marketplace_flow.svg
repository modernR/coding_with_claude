<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">사내 마켓플레이스 배포 흐름 — git·CDN에서 직원 설치까지</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">메타 저장소의 index.json이 목록을 관리하고, 직원은 한 줄로 조회·클론·설치합니다.</text>

  <defs><marker id="vca1mk_ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- top: source layer -->
  <rect x="40" y="95" width="240" height="110" rx="11" fill="#ede9fe" stroke="#a78bda"/>
  <text x="160" y="120" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">① 메타 저장소</text>
  <text x="160" y="141" font-size="10" fill="#444" text-anchor="middle">company-claude-marketplace</text>
  <text x="160" y="159" font-size="10" fill="#444" text-anchor="middle">index.json (전체 목록)</text>
  <text x="160" y="177" font-size="9.5" fill="#444" text-anchor="middle">name·version·git_url·domain</text>
  <text x="160" y="194" font-size="9.5" fill="#6b6b6b" text-anchor="middle">approval·downloads·rating</text>

  <rect x="330" y="95" width="240" height="110" rx="11" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="450" y="120" font-size="12" font-weight="700" fill="#3a6fd6" text-anchor="middle">② 플러그인 git 저장소</text>
  <text x="450" y="143" font-size="10" fill="#444" text-anchor="middle">realestate-pro/</text>
  <text x="450" y="161" font-size="10" fill="#444" text-anchor="middle">marketing-content-kr/ …</text>
  <text x="450" y="184" font-size="9.5" fill="#6b6b6b" text-anchor="middle">저장소 하나 = 플러그인 하나</text>

  <rect x="620" y="95" width="240" height="110" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="740" y="120" font-size="12" font-weight="700" fill="#b8860b" text-anchor="middle">③ CDN (선택)</text>
  <text x="740" y="143" font-size="10" fill="#444" text-anchor="middle">internal-cdn/…/plugin.zip</text>
  <text x="740" y="161" font-size="10" fill="#444" text-anchor="middle">정적 zip 호스팅</text>
  <text x="740" y="184" font-size="9.5" fill="#6b6b6b" text-anchor="middle">대규모·잦은 변경 시 빠른 배포</text>

  <line x1="280" y1="150" x2="328" y2="150" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca1mk_ar)"/>
  <line x1="570" y1="150" x2="618" y2="150" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca1mk_ar)"/>

  <!-- install command -->
  <rect x="250" y="240" width="400" height="44" rx="10" fill="#1a1a1a"/>
  <text x="450" y="267" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">claude-marketplace install realestate-pro</text>
  <line x1="450" y1="205" x2="450" y2="238" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca1mk_ar)"/>

  <!-- install steps -->
  <rect x="40" y="315" width="820" height="70" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="60" y="339" font-size="12" font-weight="700" fill="#1a7f37">직원 환경 설치 단계</text>
  <text x="60" y="361" font-size="10" fill="#444">① index에서 git_url 조회  →  ② ~/.claude/plugins/에 clone  →  ③ skills·commands로 링크·복사</text>
  <text x="60" y="378" font-size="10" fill="#444">→  ④ plugin.json의 dependencies 자동 설치  →  ⑤ 사용 가능 알림</text>
  <line x1="450" y1="284" x2="450" y2="313" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca1mk_ar)"/>
</svg>
