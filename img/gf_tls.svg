<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 330" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="330" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">HTTPS 연결 — 인증서로 신원 확인 후 암호화</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">'이 사이트가 진짜 맞나' 확인하고, 이후 주고받는 내용을 암호로 감쌉니다(TLS).</text>
  <defs><marker id="tl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>
  <rect x="60" y="118" width="170" height="150" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="145" y="150" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">브라우저</text>
  <text x="145" y="172" font-size="10.5" fill="#6b6b6b" text-anchor="middle">사용자</text>
  <rect x="670" y="118" width="170" height="150" rx="12" fill="#1a1a1a"/>
  <text x="755" y="150" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">서버</text>
  <text x="755" y="172" font-size="10.5" fill="#cfcfcf" text-anchor="middle">example.com</text>
  <line x1="230" y1="140" x2="668" y2="140" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#tl)"/>
  <text x="450" y="132" font-size="11" fill="#444" text-anchor="middle">① 접속 요청</text>
  <line x1="668" y1="178" x2="232" y2="178" stroke="#c98a95" stroke-width="1.8" marker-end="url(#tl)"/>
  <text x="450" y="170" font-size="11" fill="#b00020" text-anchor="middle">② 인증서(SSL/TLS) 제시 — 신원 증명</text>
  <rect x="300" y="192" width="300" height="30" rx="6" fill="#fff7e6" stroke="#f3d488"/>
  <text x="450" y="212" font-size="10.5" fill="#b8860b" text-anchor="middle">③ 인증기관(CA) 서명 확인 → 진짜 사이트 맞음</text>
  <line x1="230" y1="240" x2="668" y2="240" stroke="#1a7f37" stroke-width="2" marker-end="url(#tl)"/>
  <line x1="668" y1="254" x2="232" y2="254" stroke="#1a7f37" stroke-width="2" marker-end="url(#tl)"/>
  <text x="450" y="234" font-size="11" fill="#1a7f37" text-anchor="middle">④ 이후 통신은 암호화(자물쇠) — 도청해도 못 읽음</text>
  <text x="40" y="300" font-size="12" fill="#6b6b6b">※ 무료 CA(Let's Encrypt)는 90일 주기라 자동 갱신이 필수. PaaS(Vercel·Netlify)는 발급·갱신을 자동 처리합니다.</text>
</svg>
