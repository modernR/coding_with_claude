<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">훅 입출력 데이터 흐름 — 입력, 판정, 종료 코드</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">이벤트가 입력을 넘기고, 훅이 검사한 뒤, 종료 코드로 흐름을 제어합니다.</text>

  <defs><marker id="m4io_ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- input -->
  <rect x="40" y="100" width="230" height="150" rx="11" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="155" y="124" font-size="12.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">입력 (환경변수)</text>
  <rect x="60" y="138" width="190" height="28" rx="6" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="72" y="157" font-size="9.5" fill="#444">TOOL_NAME  "Edit"</text>
  <rect x="60" y="172" width="190" height="28" rx="6" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="72" y="191" font-size="9.5" fill="#444">TOOL_PARAMS  파라미터 JSON</text>
  <rect x="60" y="206" width="190" height="28" rx="6" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="72" y="225" font-size="9.5" fill="#444">TOOL_OUTPUT_FILE  결과 경로</text>

  <!-- hook -->
  <rect x="335" y="120" width="190" height="110" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="430" y="160" font-size="13" font-weight="700" fill="#b8860b" text-anchor="middle">훅 스크립트</text>
  <text x="430" y="184" font-size="10" fill="#444" text-anchor="middle">패턴·규칙 검사</text>
  <text x="430" y="202" font-size="10" fill="#444" text-anchor="middle">command / http / prompt / agent</text>

  <line x1="270" y1="175" x2="333" y2="175" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4io_ar)"/>

  <!-- outputs -->
  <line x1="525" y1="175" x2="588" y2="140" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4io_ar)"/>
  <line x1="525" y1="175" x2="588" y2="175" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4io_ar)"/>
  <line x1="525" y1="175" x2="588" y2="210" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#m4io_ar)"/>

  <rect x="592" y="112" width="268" height="46" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="608" y="132" font-size="12" font-weight="700" fill="#1a7f37">exit 0 — 통과</text>
  <text x="608" y="150" font-size="9.5" fill="#444">작업 진행 허용 (아무 일 없음)</text>

  <rect x="592" y="164" width="268" height="46" rx="9" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="608" y="184" font-size="12" font-weight="700" fill="#b8860b">exit 1 — 경고</text>
  <text x="608" y="202" font-size="9.5" fill="#444">진행하되 경고만 로그에 기록</text>

  <rect x="592" y="216" width="268" height="46" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="608" y="236" font-size="12" font-weight="700" fill="#b00020">exit 2 — 차단</text>
  <text x="608" y="254" font-size="9.5" fill="#444">작업 차단 + stderr를 Claude에 피드백</text>

  <text x="430" y="300" font-size="11" fill="#6b6b6b" text-anchor="middle">설계 원칙 — 강제할 것은 exit 2, 알릴 것은 exit 0, 로그만 남길 것은 exit 1</text>
</svg>
