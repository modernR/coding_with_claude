<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">프롬프트 엔지니어링 vs 컨텍스트 엔지니어링</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">앞은 "어떻게 물어볼까", 뒤는 "무엇을 입력에 넣을까". 대규모 운영의 핵심은 뒤쪽입니다.</text>

  <rect x="40" y="95" width="390" height="270" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="125" font-size="14" font-weight="700" fill="#3a6fd6">프롬프트 엔지니어링</text>
  <text x="60" y="147" font-size="10.5" fill="#6b6b6b">사용자 발화 자체의 품질</text>
  <rect x="60" y="162" width="350" height="46" rx="9" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="78" y="182" font-size="11" font-weight="700" fill="#1a1a1a">변수</text>
  <text x="78" y="199" font-size="10" fill="#444">단어 · 구조 · 예시(few-shot)</text>
  <rect x="60" y="216" width="350" height="46" rx="9" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="78" y="236" font-size="11" font-weight="700" fill="#1a1a1a">효과</text>
  <text x="78" y="253" font-size="10" fill="#444">응답 품질</text>
  <rect x="60" y="270" width="350" height="46" rx="9" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="78" y="290" font-size="11" font-weight="700" fill="#1a1a1a">시점</text>
  <text x="78" y="307" font-size="10" fill="#444">한 번의 호출에 영향</text>
  <text x="235" y="345" font-size="10.5" fill="#3a6fd6" text-anchor="middle">학습 단계: 입문 ~ 중급</text>

  <rect x="470" y="95" width="390" height="270" rx="12" fill="#ede9fe" stroke="#a78bda"/>
  <text x="490" y="125" font-size="14" font-weight="700" fill="#7c3aed">컨텍스트 엔지니어링</text>
  <text x="490" y="147" font-size="10.5" fill="#6b6b6b">입력에 무엇을 넣을지의 설계</text>
  <rect x="490" y="162" width="350" height="46" rx="9" fill="#ffffff" stroke="#a78bda"/>
  <text x="508" y="182" font-size="11" font-weight="700" fill="#1a1a1a">변수</text>
  <text x="508" y="199" font-size="10" fill="#444">시스템 · MCP · CLAUDE.md · 메모리 · 대화</text>
  <rect x="490" y="216" width="350" height="46" rx="9" fill="#ffffff" stroke="#a78bda"/>
  <text x="508" y="236" font-size="11" font-weight="700" fill="#1a1a1a">효과</text>
  <text x="508" y="253" font-size="10" fill="#444">응답 품질 + 비용 + 속도</text>
  <rect x="490" y="270" width="350" height="46" rx="9" fill="#ffffff" stroke="#a78bda"/>
  <text x="508" y="290" font-size="11" font-weight="700" fill="#1a1a1a">시점</text>
  <text x="508" y="307" font-size="10" fill="#444">모든 호출에 영향</text>
  <text x="665" y="345" font-size="10.5" fill="#7c3aed" text-anchor="middle">학습 단계: 고급 · 플랫폼 운영자</text>

  <text x="450" y="390" font-size="10.5" fill="#6b6b6b" text-anchor="middle">프롬프트는 "더 잘 묻는 법", 컨텍스트는 "AI가 더 잘 답할 수 있게 환경을 짜는 법"</text>
</svg>
