<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">Task Master vs Shrimp — 규모와 워크플로우로 고른다</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">큰 그림은 Task Master, 매주 실행은 Shrimp. 둘은 경쟁이 아니라 보완입니다.</text>

  <!-- Task Master card -->
  <rect x="40" y="95" width="390" height="230" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="123" font-size="15" font-weight="700" fill="#3a6fd6">Task Master</text>
  <text x="60" y="145" font-size="10.5" fill="#6b6b6b">PRD 기반 대규모 자동 분해</text>
  <text x="60" y="172" font-size="11" fill="#444">· 입력 · Markdown PRD 한 편</text>
  <text x="60" y="192" font-size="11" fill="#444">· 산출 · 100+개 작업 + 의존 그래프</text>
  <text x="60" y="212" font-size="11" fill="#444">· 복잡도 점수 · 작업별 난이도·시간</text>
  <text x="60" y="232" font-size="11" fill="#444">· 저장 · .taskmaster/tasks/tasks.json</text>
  <text x="60" y="252" font-size="11" fill="#444">· 주기 · 분기 단위 큰 그림</text>
  <rect x="60" y="268" width="350" height="44" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="72" y="288" font-size="10" fill="#444">적합 · 작업 50+개 · PRD 잘 정리됨 · 5+명 팀</text>
  <text x="72" y="304" font-size="10" fill="#444">· 분기 단위 프로젝트 · Linear 병행</text>

  <!-- Shrimp card -->
  <rect x="470" y="95" width="390" height="230" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="490" y="123" font-size="15" font-weight="700" fill="#1a7f37">Shrimp Task Manager</text>
  <text x="490" y="145" font-size="10.5" fill="#6b6b6b">가벼운 주간 단위 대안</text>
  <text x="490" y="172" font-size="11" fill="#444">· 입력 · 목표 한 줄</text>
  <text x="490" y="192" font-size="11" fill="#444">· 산출 · 10개 내외 작업</text>
  <text x="490" y="212" font-size="11" fill="#444">· 메모리 · 작업 컨텍스트 자동 관리</text>
  <text x="490" y="232" font-size="11" fill="#444">· 셋업 · 5분 · MCP 표준</text>
  <text x="490" y="252" font-size="11" fill="#444">· 주기 · 주간 단위 실행</text>
  <rect x="490" y="268" width="350" height="44" rx="8" fill="#ffffff" stroke="#cfe9d7"/>
  <text x="502" y="288" font-size="10" fill="#444">적합 · 작업 10~30개 · PRD 없이 즉석</text>
  <text x="502" y="304" font-size="10" fill="#444">· 빠른 프로토타이핑 · 1인 사이드</text>

  <!-- bottom combined note -->
  <rect x="40" y="343" width="820" height="60" rx="11" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="60" y="366" font-size="12" font-weight="700" fill="#b8860b">함께 쓰기</text>
  <text x="60" y="386" font-size="10.5" fill="#444">Task Master로 분기 백로그를 세우고, 그 주에 할 일은 Shrimp이 잘게 계획 · 큰 그림과 주간 실행을 분담합니다.</text>
</svg>
