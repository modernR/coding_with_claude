<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">Auto Memory 4종류 — 세션을 거치며 쌓이는 기억</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">시키지 않아도 학습해 다음 세션에 적용됩니다. 무엇을 담느냐가 품질을 좌우합니다.</text>

  <!-- four cards -->
  <rect x="40" y="95" width="196" height="120" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="138" y="120" font-size="13" font-weight="700" fill="#3a6fd6" text-anchor="middle">user</text>
  <text x="138" y="142" font-size="10.5" fill="#6b6b6b" text-anchor="middle">사용자 정보</text>
  <text x="138" y="170" font-size="10.5" fill="#444" text-anchor="middle">"IT 기획자,</text>
  <text x="138" y="186" font-size="10.5" fill="#444" text-anchor="middle">비개발자,</text>
  <text x="138" y="202" font-size="10.5" fill="#444" text-anchor="middle">한국어 선호"</text>

  <rect x="248" y="95" width="196" height="120" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="346" y="120" font-size="13" font-weight="700" fill="#b8860b" text-anchor="middle">feedback</text>
  <text x="346" y="142" font-size="10.5" fill="#6b6b6b" text-anchor="middle">행동 피드백</text>
  <text x="346" y="170" font-size="10.5" fill="#444" text-anchor="middle">"코드는 항상</text>
  <text x="346" y="186" font-size="10.5" fill="#444" text-anchor="middle">테스트 포함,</text>
  <text x="346" y="202" font-size="10.5" fill="#444" text-anchor="middle">간결한 설명"</text>

  <rect x="456" y="95" width="196" height="120" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="554" y="120" font-size="13" font-weight="700" fill="#1a7f37" text-anchor="middle">project</text>
  <text x="554" y="142" font-size="10.5" fill="#6b6b6b" text-anchor="middle">프로젝트 컨텍스트</text>
  <text x="554" y="170" font-size="10.5" fill="#444" text-anchor="middle">"React 기반</text>
  <text x="554" y="186" font-size="10.5" fill="#444" text-anchor="middle">RSVP 앱,</text>
  <text x="554" y="202" font-size="10.5" fill="#444" text-anchor="middle">DB는 PostgreSQL"</text>

  <rect x="664" y="95" width="196" height="120" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="762" y="120" font-size="13" font-weight="700" fill="#7c3aed" text-anchor="middle">reference</text>
  <text x="762" y="142" font-size="10.5" fill="#6b6b6b" text-anchor="middle">외부 시스템</text>
  <text x="762" y="170" font-size="10.5" fill="#444" text-anchor="middle">"이슈는 Linear,</text>
  <text x="762" y="186" font-size="10.5" fill="#444" text-anchor="middle">배포는 Vercel"</text>

  <rect x="40" y="235" width="405" height="62" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="56" y="258" font-size="11.5" font-weight="700" fill="#1a7f37">저장할 것 ✓</text>
  <text x="56" y="278" font-size="10.5" fill="#444">반복 강조 선호 · 프로젝트 결정 · 외부 연결</text>

  <rect x="455" y="235" width="405" height="62" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="471" y="258" font-size="11.5" font-weight="700" fill="#b00020">저장 금지 ✕</text>
  <text x="471" y="278" font-size="10.5" fill="#444">코드에 이미 있는 정보 · 일회성 작업 · 민감 정보</text>
</svg>
