<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">배열 설정은 덮어쓰지 않고 병합된다</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">permissions·hooks 배열은 우선순위 역순으로 누적됩니다. 조직 훅과 개인 훅이 공존합니다.</text>

  <defs><marker id="gm4am" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <rect x="40" y="100" width="300" height="90" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="126" font-size="12" font-weight="700" fill="#3a6fd6">프로젝트 (.claude/settings.json)</text>
  <text x="60" y="150" font-size="10.5" fill="#444" font-family="monospace">Bash(git log *)</text>
  <text x="60" y="172" font-size="10.5" fill="#444" font-family="monospace">Edit(*.md)</text>

  <rect x="40" y="200" width="300" height="90" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="60" y="226" font-size="12" font-weight="700" fill="#1a7f37">개인 (~/.claude/settings.json)</text>
  <text x="60" y="250" font-size="10.5" fill="#444" font-family="monospace">Bash(npm test)</text>
  <text x="60" y="272" font-size="10.5" fill="#444" font-family="monospace">Write(test/*)</text>

  <line x1="340" y1="145" x2="500" y2="170" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm4am)"/>
  <line x1="340" y1="245" x2="500" y2="200" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm4am)"/>

  <rect x="505" y="110" width="355" height="170" rx="12" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="682" y="138" font-size="13" font-weight="700" fill="#1a1a1a" text-anchor="middle">결과 — 네 가지 모두 허용</text>
  <rect x="525" y="152" width="315" height="28" rx="6" fill="#eef3fd" stroke="#bcd0f5"/>
