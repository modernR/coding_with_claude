<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="40" y="38" font-size="21" font-weight="700" fill="#1a1a1a">OAuth 2.0 — '구글로 로그인'은 어떻게 동작하나</text>
  <text x="40" y="62" font-size="14" fill="#6b6b6b">핵심: 우리 앱은 사용자의 <tspan font-weight="700">비밀번호를 절대 보지 않습니다</tspan>. 인증은 구글·카카오가 대신하고, 우리는 '증표'만 받습니다.</text>

  <defs><marker id="oa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- 3 actors -->
  <rect x="40" y="92" width="180" height="44" rx="9" fill="#1a1a1a"/><text x="130" y="119" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle">사용자 (브라우저)</text>
  <rect x="360" y="92" width="180" height="44" rx="9" fill="#fff7ef" stroke="#f0d6b8"/><text x="450" y="119" font-size="12.5" font-weight="700" fill="#b8860b" text-anchor="middle">우리 앱 (RSVP)</text>
  <rect x="680" y="92" width="180" height="44" rx="9" fill="#eef3fd" stroke="#bcd0f5"/><text x="770" y="114" font-size="12.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">구글 (인증 서버)</text><text x="770" y="129" font-size="9" fill="#6b6b6b" text-anchor="middle">비밀번호는 여기서만 입력</text>

  <!-- steps -->
  <g font-size="10.5" fill="#1a1a1a">
    <line x1="360" y1="160" x2="222" y2="160" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#oa)"/>
    <text x="228" y="155" fill="#6b6b6b">① "구글로 로그인" 클릭 → 구글 로그인 페이지로 보냄</text>

    <line x1="220" y1="188" x2="678" y2="188" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#oa)"/>
    <text x="300" y="183" fill="#6b6b6b">② 사용자가 구글에 로그인하고 '이 앱 허용' 동의</text>

    <line x1="680" y1="216" x2="542" y2="216" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#oa)"/>
    <text x="360" y="211" fill="#1a7f37">③ 임시 인가 코드(authorization code)를 앱에 전달</text>

    <line x1="540" y1="244" x2="678" y2="244" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#oa)"/>
    <text x="360" y="239" fill="#6b6b6b">④ 앱이 (코드 + 앱 비밀키)로 토큰 요청 — 뒤에서 서버끼리</text>

    <line x1="680" y1="272" x2="542" y2="272" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#oa)"/>
    <text x="360" y="267" fill="#1a7f37">⑤ 액세스 토큰(access token) 발급</text>

    <line x1="540" y1="300" x2="678" y2="300" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#oa)"/>
    <text x="360" y="295" fill="#6b6b6b">⑥ 토큰으로 사용자 이름·이메일 조회 → 로그인 완료</text>
  </g>

  <rect x="40" y="320" width="820" height="28" rx="7" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="52" y="339" font-size="11" fill="#1a7f37">이후 우리 앱은 발급받은 토큰(또는 자체 JWT)으로 세션을 유지합니다. 비밀번호 저장·유출 위험이 사라지는 것이 OAuth의 가장 큰 이점입니다.</text>
</svg>
