<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">토큰(Token) — AI가 글을 세는 단위</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">한국어 한 글자가 대략 1.5~2 토큰. 토큰 수가 곧 처리량이자 비용입니다.</text>

  <!-- 변환 감각 -->
  <rect x="40" y="92" width="400" height="200" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="120" font-size="14" font-weight="700" fill="#3a6fd6">글자 → 토큰 감각</text>
  <rect x="60" y="136" width="360" height="46" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="76" y="158" font-size="11.5" fill="#1a1a1a">한국어 1글자</text>
  <text x="404" y="158" font-size="11.5" font-weight="700" fill="#3a6fd6" text-anchor="end">≈ 1.5~2 토큰</text>
  <text x="76" y="174" font-size="10" fill="#6b6b6b">"안녕하세요" → 약 8~10 토큰</text>
  <rect x="60" y="190" width="360" height="46" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="76" y="212" font-size="11.5" fill="#1a1a1a">영어 1단어</text>
  <text x="404" y="212" font-size="11.5" font-weight="700" fill="#3a6fd6" text-anchor="end">≈ 1.3 토큰</text>
  <text x="76" y="228" font-size="10" fill="#6b6b6b">"hello world" → 약 2~3 토큰</text>
  <text x="60" y="262" font-size="10.5" fill="#6b6b6b">토큰은 사용자의 입력·AI의 출력·읽은 파일까지</text>
  <text x="60" y="278" font-size="10.5" fill="#6b6b6b">모두 포함해 계산됩니다.</text>

  <!-- 100만 토큰 감 -->
  <rect x="460" y="92" width="400" height="200" rx="12" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="480" y="120" font-size="14" font-weight="700" fill="#b8860b">100만 토큰(1MTok)은 얼마?</text>
  <rect x="480" y="136" width="360" height="66" rx="8" fill="#ffffff" stroke="#f0d6b8"/>
  <text x="500" y="162" font-size="12" fill="#1a1a1a">= 한국어 약 50만 자</text>
  <text x="500" y="186" font-size="12" fill="#1a1a1a">= A4 용지 약 250장 분량</text>
  <rect x="480" y="210" width="360" height="62" rx="8" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="500" y="234" font-size="11" font-weight="700" fill="#1a7f37">1MTok 입력 비용</text>
  <text x="500" y="256" font-size="11" fill="#444">Sonnet $3 · Opus $5 · Haiku $1</text>
</svg>
