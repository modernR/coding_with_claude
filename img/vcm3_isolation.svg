<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">격리 컨텍스트 — 메인 단독 vs 메인+서브 토큰 비교</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">서브는 자기 도메인만 봅니다. 큰 PR일수록 절감 폭이 커집니다 (예시: 20+ 파일 리뷰).</text>

  <!-- left: main only -->
  <rect x="40" y="95" width="380" height="290" rx="12" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="230" y="122" font-size="14" font-weight="700" fill="#b00020" text-anchor="middle">메인 단독 — 모든 걸 혼자</text>

  <rect x="70" y="140" width="320" height="34" rx="7" fill="#ffffff" stroke="#f3c9cf"/>
  <text x="82" y="162" font-size="10.5" fill="#444">사용자 지시 5K</text>
  <rect x="70" y="180" width="320" height="40" rx="7" fill="#ffffff" stroke="#f3c9cf"/>
  <text x="82" y="205" font-size="10.5" fill="#444">100개 파일 목록 + 최근 변경 요약 50K</text>
  <rect x="70" y="226" width="320" height="34" rx="7" fill="#ffffff" stroke="#f3c9cf"/>
  <text x="82" y="248" font-size="10.5" fill="#444">CLAUDE.md 시스템 규칙 10K</text>
  <rect x="70" y="266" width="320" height="40" rx="7" fill="#ffffff" stroke="#f3c9cf"/>
  <text x="82" y="291" font-size="10.5" fill="#444">지난 대화 히스토리 100K</text>

  <rect x="70" y="322" width="320" height="46" rx="8" fill="#b00020"/>
  <text x="230" y="343" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">합계 165K+</text>
  <text x="230" y="360" font-size="9.5" fill="#ffd7dd" text-anchor="middle">한도 도달·속도 저하·비용 급증</text>

  <!-- right: main + sub -->
  <rect x="480" y="95" width="380" height="290" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="670" y="122" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">메인 + 서브 — 도메인 분할</text>

  <rect x="510" y="140" width="320" height="70" rx="8" fill="#ede9fe" stroke="#a78bda"/>
  <text x="670" y="163" font-size="11.5" font-weight="700" fill="#7c3aed" text-anchor="middle">메인 (변경 파일 제외)</text>
  <text x="670" y="182" font-size="10" fill="#6b6b6b" text-anchor="middle">파일 목록·요청·규칙만 보관</text>
  <text x="670" y="199" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">100K</text>

  <rect x="510" y="220" width="320" height="70" rx="8" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="670" y="243" font-size="11.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">code-reviewer (서브)</text>
  <text x="670" y="262" font-size="10" fill="#6b6b6b" text-anchor="middle">변경된 파일만 전달받아 검토</text>
  <text x="670" y="279" font-size="12" font-weight="700" fill="#3a6fd6" text-anchor="middle">12K</text>

  <rect x="510" y="322" width="320" height="46" rx="8" fill="#1a7f37"/>
  <text x="670" y="343" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">합계 112K</text>
  <text x="670" y="360" font-size="9.5" fill="#cfe9d7" text-anchor="middle">165K 대비 약 32% 절감 (통상 30~50%)</text>

  <rect x="40" y="392" width="820" height="0" fill="none"/>
</svg>
