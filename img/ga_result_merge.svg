<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">결과 머지 4방식 — 메인이 전문가 결과를 어떻게 합치나</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">작업 성격에 따라 이어붙일지, 고를지, 통합할지, 종합할지를 정합니다.</text>
  <g>
    <rect x="40" y="95" width="200" height="150" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
    <text x="140" y="122" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">연결 (concat)</text>
    <rect x="70" y="140" width="40" height="20" rx="4" fill="#bcd0f5"/>
    <rect x="115" y="140" width="40" height="20" rx="4" fill="#bcd0f5"/>
    <rect x="160" y="140" width="40" height="20" rx="4" fill="#bcd0f5"/>
    <text x="140" y="192" font-size="10.5" fill="#444" text-anchor="middle">단순히 이어 붙임</text>
    <text x="140" y="212" font-size="10" fill="#6b6b6b" text-anchor="middle">예: PRD를 섹션별로</text>
  </g>
  <g>
    <rect x="250" y="95" width="200" height="150" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
    <text x="350" y="122" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">선택 (pick)</text>
    <rect x="280" y="140" width="40" height="20" rx="4" fill="#cfe9d7"/>
    <rect x="325" y="140" width="40" height="20" rx="4" fill="#1a7f37"/>
    <rect x="370" y="140" width="40" height="20" rx="4" fill="#cfe9d7"/>
    <text x="350" y="192" font-size="10.5" fill="#444" text-anchor="middle">여러 후보 중 최선 하나</text>
    <text x="350" y="212" font-size="10" fill="#6b6b6b" text-anchor="middle">예: 디자인 시안 3개 중 1개</text>
  </g>
  <g>
    <rect x="460" y="95" width="200" height="150" rx="12" fill="#fff7e6" stroke="#f3d488"/>
    <text x="560" y="122" font-size="14" font-weight="700" fill="#b8860b" text-anchor="middle">병합 (merge)</text>
    <rect x="490" y="140" width="140" height="20" rx="4" fill="#f3d488"/>
    <text x="560" y="192" font-size="10.5" fill="#444" text-anchor="middle">같은 영역 여러 관점 통합</text>
    <text x="560" y="212" font-size="10" fill="#6b6b6b" text-anchor="middle">예: 코드 리뷰 4관점</text>
  </g>
  <g>
    <rect x="670" y="95" width="190" height="150" rx="12" fill="#ede9fe" stroke="#a78bda"/>
    <text x="765" y="122" font-size="14" font-weight="700" fill="#7c3aed" text-anchor="middle">재요약 (synthesize)</text>
    <rect x="700" y="140" width="130" height="20" rx="10" fill="#a78bda"/>
    <text x="765" y="192" font-size="10.5" fill="#444" text-anchor="middle">전체를 새 결과로 종합</text>
    <text x="765" y="212" font-size="10" fill="#6b6b6b" text-anchor="middle">예: 하나의 최종 리포트</text>
  </g>
  <text x="450" y="278" font-size="11" fill="#6b6b6b" text-anchor="middle">모든 결과는 메인(메시지 허브)을 거쳐 합쳐지므로, 격리가 유지되고 조율이 단순합니다.</text>
</svg>
