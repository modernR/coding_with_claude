<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="880" height="280" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">비밀(API 키)은 어디에 두나 — 위험도 순</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">코드에서 멀어질수록 안전합니다. 코드에 넣거나 실수로 커밋하면 치명적.</text>

  <defs><marker id="se" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <g text-anchor="middle">
    <rect x="40" y="110" width="180" height="80" rx="10" fill="#fff5f6" stroke="#f3c9cf"/><text x="130" y="140" font-size="12.5" font-weight="700" fill="#b00020">코드 안</text><text x="130" y="162" font-size="10.5" fill="#b00020">극위험</text><text x="130" y="180" font-size="9.5" fill="#6b6b6b">커밋되면 공개</text>
    <rect x="248" y="110" width="180" height="80" rx="10" fill="#fff7e6" stroke="#f3d488"/><text x="338" y="140" font-size="12.5" font-weight="700" fill="#b8860b">.env (로컬)</text><text x="338" y="162" font-size="10.5" fill="#b8860b">위험</text><text x="338" y="180" font-size="9.5" fill="#6b6b6b">.gitignore 필수</text>
    <rect x="456" y="110" width="180" height="80" rx="10" fill="#eef3fd" stroke="#bcd0f5"/><text x="546" y="140" font-size="12.5" font-weight="700" fill="#3a6fd6">환경 변수(배포)</text><text x="546" y="162" font-size="10.5" fill="#3a6fd6">낮음</text><text x="546" y="180" font-size="9.5" fill="#6b6b6b">Vercel 패널 등</text>
    <rect x="664" y="110" width="180" height="80" rx="10" fill="#f1faf3" stroke="#cfe9d7"/><text x="754" y="138" font-size="12.5" font-weight="700" fill="#1a7f37">Secret Manager</text><text x="754" y="160" font-size="10.5" fill="#1a7f37">최저</text><text x="754" y="178" font-size="9.5" fill="#6b6b6b">암호화·회전·감사</text>
  </g>
  <line x1="220" y1="150" x2="246" y2="150" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#se)"/>
  <line x1="428" y1="150" x2="454" y2="150" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#se)"/>
  <line x1="636" y1="150" x2="662" y2="150" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#se)"/>
  <text x="440" y="98" font-size="11" fill="#1a7f37" text-anchor="middle">→ 안전해지는 방향</text>

  <text x="40" y="230" font-size="12" fill="#1a1a1a">권장: 개발 = .env(+.gitignore) · 배포 = 환경 변수 패널 · 엔터프라이즈 = Secret Manager. 키는 주기적으로 회전.</text>
  <text x="40" y="256" font-size="11.5" fill="#b00020">사고 시: ① 키 즉시 무효화(회전) ② 히스토리 정리 ③ 새 저장소 이전 — '노출된 키는 이미 유출된 것'으로 간주.</text>
</svg>
