<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="280" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">Effort 수준 — 추론 깊이로 품질과 비용을 조절</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">모든 모델에 적용되는 추론 깊이 설정. 작업 성격에 맞춰 low·medium·high를 고릅니다.</text>
  <g>
    <rect x="40" y="95" width="255" height="140" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
    <text x="60" y="122" font-size="15" font-weight="700" fill="#1a7f37">low</text>
    <text x="60" y="146" font-size="11" fill="#444">얕은 추론 · 최저 비용</text>
    <line x1="60" y1="158" x2="275" y2="158" stroke="#cfe9d7"/>
    <text x="60" y="182" font-size="10.5" fill="#444">추천: 간단 검색, 리스팅</text>
    <rect x="60" y="198" width="215" height="24" rx="6" fill="#e8f6ec"/>
    <text x="70" y="215" font-size="9.5" fill="#1a7f37">CLAUDE_CODE_EFFORT_LEVEL=low</text>
  </g>
  <g>
    <rect x="322" y="95" width="255" height="140" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
    <text x="342" y="122" font-size="15" font-weight="700" fill="#3a6fd6">medium</text>
    <text x="342" y="146" font-size="11" fill="#444">중간 추론 · 중간 비용 (기본)</text>
    <line x1="342" y1="158" x2="557" y2="158" stroke="#bcd0f5"/>
    <text x="342" y="182" font-size="10.5" fill="#444">추천: 일반 코딩</text>
    <rect x="342" y="198" width="215" height="24" rx="6" fill="#e3edfb"/>
    <text x="352" y="215" font-size="9.5" fill="#3a6fd6">...EFFORT_LEVEL=medium</text>
  </g>
  <g>
    <rect x="604" y="95" width="256" height="140" rx="12" fill="#fff7e6" stroke="#f3d488"/>
    <text x="624" y="122" font-size="15" font-weight="700" fill="#b8860b">high</text>
    <text x="624" y="146" font-size="11" fill="#444">깊은 추론 · 높은 비용</text>
    <line x1="624" y1="158" x2="840" y2="158" stroke="#f3d488"/>
    <text x="624" y="182" font-size="10.5" fill="#444">추천: 설계, 복잡 추론</text>
    <rect x="624" y="198" width="216" height="24" rx="6" fill="#faf3e0"/>
    <text x="634" y="215" font-size="9.5" fill="#b8860b">...EFFORT_LEVEL=high</text>
  </g>
  <text x="450" y="262" font-size="11" fill="#6b6b6b" text-anchor="middle">모델 별칭(haiku·sonnet·opus)이 "누구에게"라면, Effort는 "얼마나 깊이 생각할지"를 정합니다.</text>
</svg>
