<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="300" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">토큰이 녹는 3가지 이유와 처방</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">비용은 대부분 아래 세 곳에서 새어 나갑니다. 각 원인에 맞는 처방이 있습니다.</text>

  <defs><marker id="tb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- 원인 1 -->
  <rect x="40" y="96" width="320" height="52" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="120" font-size="12" font-weight="700" fill="#b00020">① 부적절한 모델 선택</text>
  <text x="56" y="140" font-size="10" fill="#444">모든 작업에 Opus → 비용 몇 배</text>
  <line x1="360" y1="122" x2="418" y2="122" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#tb)"/>
  <rect x="420" y="96" width="440" height="52" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="436" y="120" font-size="11" font-weight="700" fill="#1a7f37">Sonnet 기본 · 단순 반복은 Haiku · 필요할 때만 Opus</text>
  <text x="436" y="140" font-size="10" fill="#444">작업 성격에 맞춰 모델을 내리고 올립니다.</text>

  <!-- 원인 2 -->
  <rect x="40" y="160" width="320" height="52" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="184" font-size="12" font-weight="700" fill="#b00020">② 컨텍스트 정리 안 함</text>
  <text x="56" y="204" font-size="10" fill="#444">한 세션에 여러 작업 누적</text>
  <line x1="360" y1="186" x2="418" y2="186" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#tb)"/>
  <rect x="420" y="160" width="440" height="52" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="436" y="184" font-size="11" font-weight="700" fill="#1a7f37">한 세션 = 한 작업 · 끝나면 /clear · 길면 /compact</text>
  <text x="436" y="204" font-size="10" fill="#444">/compact는 긴 세션을 절반으로 요약합니다.</text>

  <!-- 원인 3 -->
  <rect x="40" y="224" width="320" height="52" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="248" font-size="12" font-weight="700" fill="#b00020">③ 같은 자료 반복 읽기</text>
  <text x="56" y="268" font-size="10" fill="#444">CLAUDE.md가 없어 매번 재설명</text>
  <line x1="360" y1="250" x2="418" y2="250" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#tb)"/>
  <rect x="420" y="224" width="440" height="52" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="436" y="248" font-size="11" font-weight="700" fill="#1a7f37">CLAUDE.md로 반복 설명 제거 · MCP는 필요한 것만</text>
  <text x="436" y="268" font-size="10" fill="#444">프로젝트 특성을 한 번 적어두면 매 세션이 참조합니다.</text>
</svg>
