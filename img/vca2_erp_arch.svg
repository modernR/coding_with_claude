<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">사내 ERP 연결 아키텍처 — 자체 MCP가 놓이는 자리</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">MCP 서버는 에이전트와 사내 시스템 사이의 얇은 번역기입니다. 사내 데이터는 사내에 머뭅니다.</text>
  <defs>
    <marker id="vca2erp_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect x="40" y="100" width="180" height="220" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="130" y="128" font-size="13" font-weight="700" fill="#3a6fd6" text-anchor="middle">사용자·에이전트</text>
  <rect x="60" y="150" width="140" height="70" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="130" y="176" font-size="10.5" fill="#444" text-anchor="middle">"우리 부서 이번</text>
  <text x="130" y="193" font-size="10.5" fill="#444" text-anchor="middle">분기 예산 집행률"</text>
  <text x="130" y="211" font-size="9.5" fill="#9aa0a6" text-anchor="middle">자연어 요청</text>
  <rect x="60" y="235" width="140" height="70" rx="8" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="130" y="261" font-size="10.5" fill="#444" text-anchor="middle">Cowork이 어떤</text>
  <text x="130" y="278" font-size="10.5" fill="#444" text-anchor="middle">도구를 부를지 판단</text>
  <text x="130" y="296" font-size="9.5" fill="#9aa0a6" text-anchor="middle">tools/call</text>

  <rect x="360" y="90" width="500" height="245" rx="12" fill="#f7f8fa" stroke="#d0d4d9" stroke-dasharray="5 4"/>
  <text x="610" y="112" font-size="11.5" font-weight="700" fill="#6b6b6b" text-anchor="middle">사내 네트워크 (VPN·방화벽 안)</text>

  <rect x="380" y="130" width="200" height="180" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="480" y="156" font-size="13" font-weight="700" fill="#b8860b" text-anchor="middle">자체 MCP 서버</text>
  <text x="480" y="176" font-size="10" fill="#444" text-anchor="middle">도구 정의 + 핸들러</text>
  <text x="480" y="194" font-size="10" fill="#444" text-anchor="middle">인증 검사</text>
  <text x="480" y="212" font-size="10" fill="#444" text-anchor="middle">권한(RBAC) 확인</text>
  <text x="480" y="230" font-size="10" fill="#444" text-anchor="middle">감사 로그 기록</text>
  <rect x="400" y="248" width="160" height="46" rx="7" fill="#ffffff" stroke="#f3d488"/>
  <text x="480" y="269" font-size="9.5" fill="#6b6b6b" text-anchor="middle">사내 API를 SQL·REST로</text>
  <text x="480" y="285" font-size="9.5" fill="#6b6b6b" text-anchor="middle">번역해 호출</text>

  <rect x="640" y="130" width="200" height="85" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="740" y="156" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">사내 ERP·DB</text>
  <text x="740" y="178" font-size="10" fill="#444" text-anchor="middle">예산·매물·고객</text>
  <text x="740" y="196" font-size="10" fill="#444" text-anchor="middle">PostgreSQL 등</text>

  <rect x="640" y="228" width="200" height="82" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="740" y="254" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">문서 시스템</text>
  <text x="740" y="276" font-size="10" fill="#444" text-anchor="middle">계약서·PDF</text>
  <text x="740" y="294" font-size="10" fill="#444" text-anchor="middle">(Resources로 노출)</text>

  <line x1="220" y1="200" x2="378" y2="200" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca2erp_arr)"/>
  <text x="299" y="192" font-size="10" fill="#6b6b6b" text-anchor="middle">MCP 요청</text>
  <line x1="580" y1="185" x2="638" y2="172" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca2erp_arr)"/>
  <line x1="580" y1="255" x2="638" y2="262" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca2erp_arr)"/>

  <rect x="40" y="345" width="820" height="45" rx="9" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="60" y="366" font-size="11.5" fill="#444">핵심: 사내 데이터는 사내 네트워크를 벗어나지 않습니다. MCP 서버는 "무엇을 조회할 수 있는지"만 밖으로 노출하고,</text>
  <text x="60" y="383" font-size="11.5" fill="#444">실제 데이터 접근은 인증·권한·감사 로그를 거쳐야만 이뤄집니다. 이 세 겹이 자체 MCP의 안전장치입니다.</text>
</svg>
