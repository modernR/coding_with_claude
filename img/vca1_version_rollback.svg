<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">버전 관리와 롤백 — SemVer · 업데이트 · 되돌리기</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">MAJOR.MINOR.PATCH로 버전을 매기고, git tag·CHANGELOG가 정리돼 있으면 롤백이 안전합니다.</text>

  <defs><marker id="vca1vr_ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- SemVer legend -->
  <rect x="40" y="90" width="820" height="66" rx="11" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="60" y="114" font-size="12" font-weight="700" fill="#1a1a1a">Semantic Versioning — MAJOR.MINOR.PATCH</text>
  <text x="60" y="137" font-size="10.5" fill="#444">MAJOR 호환 깨짐 (1.x→2.0)   ·   MINOR 호환 기능 추가 (1.1→1.2)   ·   PATCH 버그 수정 (1.2.0→1.2.1)</text>
  <text x="60" y="151" font-size="9.5" fill="#6b6b6b">모든 변경은 CHANGELOG.md에 기록 — 롤백 판단의 근거가 됩니다.</text>

  <!-- version timeline -->
  <rect x="60" y="200" width="120" height="46" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="120" y="222" font-size="12" font-weight="700" fill="#3a6fd6" text-anchor="middle">1.2.0</text>
  <text x="120" y="238" font-size="9" fill="#6b6b6b" text-anchor="middle">안정 버전</text>

  <rect x="240" y="200" width="120" height="46" rx="9" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="300" y="222" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">1.3.0</text>
  <text x="300" y="238" font-size="9" fill="#6b6b6b" text-anchor="middle">기능 추가 배포</text>

  <rect x="420" y="200" width="150" height="46" rx="9" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="495" y="222" font-size="11.5" font-weight="700" fill="#b00020" text-anchor="middle">1.3.0 문제 발견</text>
  <text x="495" y="238" font-size="9" fill="#6b6b6b" text-anchor="middle">회귀·충돌</text>

  <rect x="630" y="200" width="230" height="46" rx="9" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="745" y="220" font-size="11" font-weight="700" fill="#3a6fd6" text-anchor="middle">install realestate-pro@1.2.0</text>
  <text x="745" y="237" font-size="9" fill="#6b6b6b" text-anchor="middle">즉시 롤백</text>

  <line x1="180" y1="223" x2="238" y2="223" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca1vr_ar)"/>
  <line x1="360" y1="223" x2="418" y2="223" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca1vr_ar)"/>
  <path d="M570,223 L628,223" stroke="#b00020" stroke-width="1.5" fill="none" marker-end="url(#vca1vr_ar)"/>

  <!-- update check + compat -->
  <rect x="60" y="286" width="380" height="76" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="80" y="310" font-size="12" font-weight="700" fill="#b8860b">업데이트 점검</text>
  <text x="80" y="332" font-size="10" fill="#444">claude-marketplace check-updates</text>
  <text x="80" y="349" font-size="9.5" fill="#6b6b6b">hook으로 주 1회 자동 점검 → 새 버전 알림</text>

  <rect x="460" y="286" width="400" height="76" rx="11" fill="#ede9fe" stroke="#a78bda"/>
  <text x="480" y="310" font-size="12" font-weight="700" fill="#7c3aed">설치 전 호환성 3점검</text>
  <text x="480" y="332" font-size="10" fill="#444">① 이름 충돌  ② 필요한 MCP 누락  ③ CLAUDE.md 룰 충돌</text>
  <text x="480" y="349" font-size="9.5" fill="#6b6b6b">설치 전에 자동 점검하면 사고를 예방합니다.</text>
</svg>
