<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">병렬 vs 순차 — 여러 서브를 어떻게 돌리나</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">병렬은 속도(관점이 독립), 순차는 의존(앞 결과가 뒤 입력).</text>

  <defs><marker id="gm3ps" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- parallel -->
  <rect x="40" y="90" width="400" height="215" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="240" y="116" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">병렬 (속도)</text>
  <rect x="185" y="128" width="110" height="34" rx="7" fill="#ffffff" stroke="#cfe9d7"/>
  <text x="240" y="150" font-size="11" fill="#444" text-anchor="middle">메인 (PM)</text>
  <rect x="60" y="200" width="110" height="40" rx="7" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="115" y="224" font-size="10.5" fill="#3a6fd6" text-anchor="middle">code-reviewer</text>
  <rect x="185" y="200" width="110" height="40" rx="7" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="240" y="224" font-size="10.5" fill="#b00020" text-anchor="middle">security</text>
  <rect x="310" y="200" width="110" height="40" rx="7" fill="#ede9fe" stroke="#a78bda"/>
  <text x="365" y="224" font-size="10.5" fill="#7c3aed" text-anchor="middle">ui-reviewer</text>
  <line x1="220" y1="162" x2="130" y2="198" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm3ps)"/>
  <line x1="240" y1="162" x2="240" y2="198" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm3ps)"/>
  <line x1="260" y1="162" x2="350" y2="198" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm3ps)"/>
  <text x="240" y="272" font-size="10.5" fill="#444" text-anchor="middle">셋이 동시에 검토 → 메인이 합침</text>
  <text x="240" y="290" font-size="10" fill="#6b6b6b" text-anchor="middle">도메인이 명확히 분리될 때만 이득</text>

  <!-- sequential -->
  <rect x="460" y="90" width="400" height="215" rx="12" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="660" y="116" font-size="14" font-weight="700" fill="#b8860b" text-anchor="middle">순차 (의존)</text>
  <rect x="490" y="150" width="150" height="44" rx="8" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="565" y="170" font-size="10.5" fill="#3a6fd6" text-anchor="middle">code-reviewer</text>
  <text x="565" y="186" font-size="9.5" fill="#6b6b6b" text-anchor="middle">리뷰 결과 산출</text>
  <rect x="680" y="150" width="150" height="44" rx="8" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="755" y="170" font-size="10.5" fill="#1a7f37" text-anchor="middle">docs-updater</text>
  <text x="755" y="186" font-size="9.5" fill="#6b6b6b" text-anchor="middle">README 갱신</text>
  <line x1="640" y1="172" x2="678" y2="172" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm3ps)"/>
  <text x="660" y="240" font-size="10.5" fill="#444" text-anchor="middle">앞 서브의 출력이 뒤 서브의 입력</text>
  <text x="660" y="266" font-size="10" fill="#6b6b6b" text-anchor="middle">순서가 중요할 때 · 3개 이상이면</text>
  <text x="660" y="284" font-size="10" fill="#6b6b6b" text-anchor="middle">순차 처리를 검토</text>
</svg>
