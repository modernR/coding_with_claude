<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">모놀리식 vs 마이크로서비스</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">모든 기능을 한 덩어리로 두느냐, 기능별 독립 서비스로 쪼개느냐.</text>
  <rect x="36" y="92" width="392" height="200" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="56" y="118" font-size="15" font-weight="700" fill="#3a6fd6">모놀리식 — 한 덩어리</text>
  <rect x="80" y="136" width="300" height="110" rx="10" fill="#ffffff" stroke="#bcd0f5"/>
  <rect x="100" y="156" width="120" height="34" rx="5" fill="#eef3fd" stroke="#bcd0f5"/><text x="160" y="178" font-size="10.5" fill="#3a6fd6" text-anchor="middle">신청</text>
  <rect x="240" y="156" width="120" height="34" rx="5" fill="#eef3fd" stroke="#bcd0f5"/><text x="300" y="178" font-size="10.5" fill="#3a6fd6" text-anchor="middle">인증</text>
  <rect x="100" y="200" width="120" height="34" rx="5" fill="#eef3fd" stroke="#bcd0f5"/><text x="160" y="222" font-size="10.5" fill="#3a6fd6" text-anchor="middle">알림</text>
  <rect x="240" y="200" width="120" height="34" rx="5" fill="#eef3fd" stroke="#bcd0f5"/><text x="300" y="222" font-size="10.5" fill="#3a6fd6" text-anchor="middle">결제</text>
  <text x="56" y="272" font-size="11" fill="#444">배포·개발 간단 · 트랜잭션 쉬움</text>
  <text x="56" y="288" font-size="11" fill="#b00020">한 곳 장애가 전체로 번짐 · 부분 확장 어려움</text>
  <rect x="472" y="92" width="392" height="200" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="492" y="118" font-size="15" font-weight="700" fill="#1a7f37">마이크로서비스 — 기능별 분리</text>
  <rect x="500" y="140" width="82" height="50" rx="8" fill="#ffffff" stroke="#cfe9d7"/><text x="541" y="170" font-size="10.5" fill="#1a7f37" text-anchor="middle">신청</text>
  <rect x="596" y="140" width="82" height="50" rx="8" fill="#ffffff" stroke="#cfe9d7"/><text x="637" y="170" font-size="10.5" fill="#1a7f37" text-anchor="middle">인증</text>
  <rect x="692" y="140" width="82" height="50" rx="8" fill="#ffffff" stroke="#cfe9d7"/><text x="733" y="170" font-size="10.5" fill="#1a7f37" text-anchor="middle">알림</text>
  <rect x="596" y="204" width="82" height="50" rx="8" fill="#ffffff" stroke="#cfe9d7"/><text x="637" y="234" font-size="10.5" fill="#1a7f37" text-anchor="middle">결제</text>
  <text x="492" y="278" font-size="11" fill="#444">독립 배포·확장 · 한 곳 장애 격리</text>
  <text x="492" y="288" font-size="11" fill="#b00020">복잡 · 서비스 간 통신 비용 큼</text>
</svg>
