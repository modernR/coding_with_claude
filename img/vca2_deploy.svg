<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">로컬 vs 원격 배포 — 회사 규모에 맞춰 고른다</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">stdio 로컬은 단순하고, HTTP/SSE 원격은 중앙 운영에 강합니다. 하이브리드로 단계를 밟습니다.</text>
  <defs>
    <marker id="vca2dep_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect x="40" y="100" width="390" height="210" rx="12" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="235" y="128" font-size="14" font-weight="700" fill="#1a7f37" text-anchor="middle">로컬 stdio — 직원별 설치</text>
  <text x="235" y="147" font-size="11" fill="#6b6b6b" text-anchor="middle">표준 입출력으로 로컬 프로세스와 대화</text>
  <text x="60" y="176" font-size="11" font-weight="700" fill="#1a7f37">＋ 장점</text>
  <text x="60" y="197" font-size="10.5" fill="#444">가장 단순 · 인프라 불필요</text>
  <text x="60" y="215" font-size="10.5" fill="#444">인증 간단 (직원 본인 자격 증명)</text>
  <text x="60" y="245" font-size="11" font-weight="700" fill="#b00020">－ 단점</text>
  <text x="60" y="266" font-size="10.5" fill="#444">직원마다 설치·업데이트 개별 진행</text>
  <text x="60" y="284" font-size="10.5" fill="#444">사내 DB 접근 시 VPN 필요할 수 있음</text>
  <rect x="60" y="292" width="350" height="0.5" fill="none"/>

  <rect x="470" y="100" width="390" height="210" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="665" y="128" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">원격 HTTP/SSE — 중앙 서버</text>
  <text x="665" y="147" font-size="11" fill="#6b6b6b" text-anchor="middle">한 곳에 서버를 띄우고 모두가 접속</text>
  <text x="490" y="176" font-size="11" font-weight="700" fill="#1a7f37">＋ 장점</text>
  <text x="490" y="197" font-size="10.5" fill="#444">1군데 운영 · 자동 업데이트</text>
  <text x="490" y="215" font-size="10.5" fill="#444">인증·로깅 중앙 · 대규모 동시 사용</text>
  <text x="490" y="245" font-size="11" font-weight="700" fill="#b00020">－ 단점</text>
  <text x="490" y="266" font-size="10.5" fill="#444">인프라 필요 (서버·도메인·SSL)</text>
  <text x="490" y="284" font-size="10.5" fill="#444">인증 복잡 · 사내 보안 정책 검토</text>

  <rect x="40" y="330" width="820" height="60" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="60" y="354" font-size="12" font-weight="700" fill="#1a1a1a">하이브리드 — 규모에 맞춰 선택</text>
  <text x="60" y="378" font-size="11" fill="#444">작은 회사는 로컬 stdio · 중간 회사는 원격 SSE + 사내 SSO · 큰 회사는 Kubernetes로 가용성·로드밸런싱까지.</text>
</svg>
