<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">Claude 제품 생태계 — 같은 모델, 다른 포장</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">Anthropic은 하나의 Claude 모델을 여러 인터페이스로 감싸 내놓습니다.</text>

  <!-- 중앙 모델 -->
  <rect x="360" y="92" width="180" height="52" rx="26" fill="#1a1a1a"/>
  <text x="450" y="118" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Claude 모델</text>
  <text x="450" y="135" font-size="9.5" fill="#cfcfcf" text-anchor="middle">Opus 4.8 · Sonnet 4.6 · Haiku 4.5</text>

  <!-- 공용 -->
  <text x="150" y="178" font-size="12.5" font-weight="700" fill="#6b6b6b" text-anchor="middle">모든 사용자</text>
  <rect x="40" y="190" width="220" height="46" rx="9" fill="#fafbfc" stroke="#e3e6ea"/><text x="56" y="210" font-size="11.5" font-weight="700" fill="#1a1a1a">1. Claude.ai 채팅</text><text x="56" y="227" font-size="10" fill="#6b6b6b">웹 브라우저 · 정식</text>
  <rect x="40" y="244" width="220" height="46" rx="9" fill="#fafbfc" stroke="#e3e6ea"/><text x="56" y="264" font-size="11.5" font-weight="700" fill="#1a1a1a">2. 데스크톱 앱</text><text x="56" y="281" font-size="10" fill="#6b6b6b">채팅 + Cowork + MCP 호스팅</text>
  <rect x="40" y="298" width="220" height="46" rx="9" fill="#fafbfc" stroke="#e3e6ea"/><text x="56" y="318" font-size="11.5" font-weight="700" fill="#1a1a1a">5. Claude in Chrome</text><text x="56" y="335" font-size="10" fill="#6b6b6b">브라우저 확장 · 베타</text>
  <rect x="40" y="352" width="220" height="46" rx="9" fill="#fafbfc" stroke="#e3e6ea"/><text x="56" y="372" font-size="11.5" font-weight="700" fill="#1a1a1a">6. Claude in Excel</text><text x="56" y="389" font-size="10" fill="#6b6b6b">Office 애드인 · 베타</text>

  <!-- 비개발자 -->
  <text x="450" y="178" font-size="12.5" font-weight="700" fill="#b8860b" text-anchor="middle">비개발자용</text>
  <rect x="320" y="190" width="260" height="120" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="450" y="222" font-size="14" font-weight="700" fill="#b8860b" text-anchor="middle">3. Claude Cowork</text>
  <text x="450" y="246" font-size="10.5" fill="#8a6d1a" text-anchor="middle">데스크톱 앱 안의 로컬 에이전트 모드</text>
  <text x="450" y="266" font-size="10.5" fill="#8a6d1a" text-anchor="middle">기획·마케팅·운영 · 리서치 프리뷰</text>
  <text x="450" y="292" font-size="10" fill="#6b6b6b" text-anchor="middle">★ 이 교재가 다루는 주 도구</text>

  <!-- 개발자 -->
  <text x="750" y="178" font-size="12.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">개발자용</text>
  <rect x="640" y="190" width="220" height="82" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="750" y="216" font-size="13" font-weight="700" fill="#3a6fd6" text-anchor="middle">4. Claude Code</text>
  <text x="750" y="238" font-size="10" fill="#3a6fd6" text-anchor="middle">터미널(CLI) · 정식</text>
  <text x="750" y="258" font-size="10" fill="#6b6b6b" text-anchor="middle">코딩·시스템 작업 위임</text>
  <rect x="640" y="284" width="220" height="60" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="750" y="308" font-size="12.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">7. API · Agent SDK</text>
  <text x="750" y="328" font-size="10" fill="#6b6b6b" text-anchor="middle">자체 에이전트 제품 개발 · 정식</text>

  <text x="40" y="420" font-size="11" fill="#9aa0a6">Cowork은 별도 앱이 아니라 데스크톱 앱 안의 한 모드입니다. Cowork도 내부적으로 Claude Code 위에 만들어져 있습니다.</text>
</svg>
