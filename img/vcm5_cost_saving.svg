<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">MCP 비용 절감 4패턴 — 새는 곳을 막는 법</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">MCP 프로토콜 자체는 무료입니다. 비용은 토큰·외부 SaaS 호출·서버 호스팅에서 나옵니다.</text>

  <rect x="40" y="95" width="405" height="120" rx="11" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="122" font-size="13" font-weight="700" fill="#3a6fd6">① 필요한 MCP만 켠다</text>
  <text x="60" y="146" font-size="11" fill="#444">항상 켜두지 말고 프로젝트별(B)·세션별(C)로 골라 켭니다.</text>
  <text x="60" y="166" font-size="11" fill="#444">안 쓰는 MCP를 끄면 시작 컨텍스트가 그만큼 되살아납니다.</text>
  <text x="60" y="192" font-size="10" fill="#9aa0a6">토큰 절감 · 메타데이터 상시 비용을 줄임</text>

  <rect x="455" y="95" width="405" height="120" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="475" y="122" font-size="13" font-weight="700" fill="#1a7f37">② 결과를 캐싱한다</text>
  <text x="475" y="146" font-size="11" fill="#444">같은 데이터를 자주 조회한다면 30분~1시간 캐싱합니다.</text>
  <text x="475" y="166" font-size="11" fill="#444">MCP 서버 단에서 처리하면 같은 호출을 반복하지 않습니다.</text>
  <text x="475" y="192" font-size="10" fill="#9aa0a6">외부 SaaS 호출 · 반복 호출 요금을 줄임</text>

  <rect x="40" y="230" width="405" height="120" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="60" y="257" font-size="13" font-weight="700" fill="#b8860b">③ 큰 응답을 줄인다</text>
  <text x="60" y="281" font-size="11" fill="#444">Notion DB 1000행을 다 가져오지 말고 filter·page_size·</text>
  <text x="60" y="301" font-size="11" fill="#444">columns를 명시해 필요한 조각만 받습니다.</text>
  <text x="60" y="327" font-size="10" fill="#9aa0a6">토큰 절감 · 응답이 컨텍스트를 잠식하지 않게</text>

  <rect x="455" y="230" width="405" height="120" rx="11" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="475" y="257" font-size="13" font-weight="700" fill="#b00020">④ 읽기 권한을 우선한다</text>
  <text x="475" y="281" font-size="11" fill="#444">write는 비싼 사고 위험을 안습니다. read 전용으로 시작해</text>
  <text x="475" y="301" font-size="11" fill="#444">쓰기 작업은 사람 승인 뒤에만 엽니다.</text>
  <text x="475" y="327" font-size="10" fill="#9aa0a6">사고 비용 · 잘못된 환불·삭제를 예방</text>
</svg>
