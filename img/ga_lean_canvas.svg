  </g>
  <text x="450" y="300" font-size="11" fill="#6b6b6b" text-anchor="middle">작성 후 자동 검증 — 9영역 일관성 · 경쟁 분석 충실도 · 지표 측정성 · 실행 가능성 · Top 5 위험</text>
  <text x="450" y="322" font-size="10.5" fill="#b00020" text-anchor="middle">"구독으로 번다"(X) → "월 구독 2.9만원, Pro 5.9만원, PG 수수료 0.5%"(O)</text>
