<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <defs><marker id="mcf" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">대규모 코드 변경 흐름 — 탐색부터 PR까지</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">무작정 고치지 않습니다. 구조 파악 → 재현 → 가설·패치 → 검증의 순서를 지킵니다.</text>

  <rect x="40" y="100" width="185" height="150" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="58" y="124" font-size="12" font-weight="700" fill="#3a6fd6">1 구조 파악</text>
  <g font-size="10.5" fill="#444">
    <text x="58" y="148">Glob·Grep 파일 검색</text>
    <text x="58" y="168">CLAUDE.md로 폴더·</text>
    <text x="58" y="184">스택 확인</text>
    <text x="58" y="208">영향 범위 사전 파악</text>
  </g>

  <rect x="245" y="100" width="185" height="150" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="263" y="124" font-size="12" font-weight="700" fill="#b8860b">2 재현·위치</text>
  <g font-size="10.5" fill="#444">
    <text x="263" y="148">버그를 직접 재현</text>
    <text x="263" y="168">에러 스택·로그에서</text>
    <text x="263" y="184">출발점 추적</text>
    <text x="263" y="208">Grep로 관련 패턴</text>
    <text x="263" y="224">모두 수집</text>
  </g>

  <rect x="450" y="100" width="185" height="150" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="468" y="124" font-size="12" font-weight="700" fill="#7c3aed">3 가설·패치</text>
  <g font-size="10.5" fill="#444">
    <text x="468" y="148">원인 가설 먼저 명시</text>
    <text x="468" y="168">최소 단위로 수정</text>
    <text x="468" y="188">(한 번에 여러 곳 X)</text>
    <text x="468" y="212">단계마다 피드백</text>
  </g>

  <rect x="655" y="100" width="205" height="150" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="673" y="124" font-size="12" font-weight="700" fill="#1a7f37">4 테스트·검증</text>
  <g font-size="10.5" fill="#444">
    <text x="673" y="148">버그 미재현 확인</text>
    <text x="673" y="168">기존 테스트 무결성</text>
    <text x="673" y="188">확인</text>
    <text x="673" y="212">필요 시 회귀 테스트</text>
    <text x="673" y="228">추가</text>
  </g>

  <line x1="225" y1="175" x2="245" y2="175" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#mcf)"/>
  <line x1="430" y1="175" x2="450" y2="175" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#mcf)"/>
  <line x1="635" y1="175" x2="655" y2="175" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#mcf)"/>

  <rect x="40" y="275" width="820" height="95" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="299" font-size="12.5" font-weight="700" fill="#1a1a1a">감싸는 장치 — 플랜 모드 · PR · 워크트리</text>
  <g font-size="11" fill="#444">
    <text x="56" y="323">Plan Mode(/plan): 대규모 변경 전 "무엇을 할지"를 먼저 승인받아 방향 이탈을 예방</text>
    <text x="56" y="345">PR 자동화: feature 브랜치 → 커밋 → gh pr create, 본문에 "왜 필요한가" 기록</text>
    <text x="56" y="365">Git Worktree: 여러 브랜치를 별도 디렉토리로 동시에 열어 컨텍스트 스위칭 비용 감소</text>
  </g>
</svg>
