<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">변경 영향 분석 — 하나를 옮기면 무엇이 흔들리나</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">마일스톤 이동 하나가 후속 작업·리소스·재무·위험으로 번지는 파장을 자동 추적합니다.</text>

  <defs><marker id="vca6ia_ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- 변경 요청 -->
  <rect x="40" y="94" width="200" height="56" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="140" y="117" font-size="11" font-weight="700" fill="#b00020" text-anchor="middle">변경 요청 (자연어)</text>
  <text x="140" y="137" font-size="9.5" fill="#444" text-anchor="middle">"정식 출시를 Q2→Q3로"</text>

  <!-- 5단계 분석 -->
  <rect x="300" y="88" width="270" height="200" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="320" y="112" font-size="12" font-weight="700" fill="#b8860b">영향 분석 5단계</text>
  <text x="320" y="140" font-size="10" fill="#444">① 의존 관계 그래프 추적</text>
  <text x="320" y="167" font-size="10" fill="#444">② 후속 마일스톤 식별</text>
  <text x="320" y="194" font-size="10" fill="#444">③ 리소스 재배치 시뮬레이션</text>
  <text x="320" y="221" font-size="10" fill="#444">④ 재무 영향 (수익 시점 지연)</text>
  <text x="320" y="248" font-size="10" fill="#444">⑤ 위험·기회 재평가</text>
  <text x="320" y="274" font-size="9.5" fill="#6b6b6b">AI가 파장을 계산만 — 반영은 아직 안 함</text>
  <line x1="240" y1="122" x2="298" y2="150" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6ia_ar)"/>

  <!-- 결과 3묶음 -->
  <rect x="620" y="88" width="250" height="58" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="632" y="110" font-size="10.5" font-weight="700" fill="#3a6fd6">직접 영향</text>
  <text x="632" y="128" font-size="9.5" fill="#444">해당 마일스톤 지연</text>
  <text x="632" y="142" font-size="9.5" fill="#444">매출 시작 지연</text>

  <rect x="620" y="156" width="250" height="58" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="632" y="178" font-size="10.5" font-weight="700" fill="#3a6fd6">간접 영향</text>
  <text x="632" y="196" font-size="9.5" fill="#444">후속 마일스톤 자동 이동</text>
  <text x="632" y="210" font-size="9.5" fill="#444">인력 재배치·경쟁 위험 ↑</text>

  <rect x="620" y="224" width="250" height="58" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="632" y="246" font-size="10.5" font-weight="700" fill="#1a7f37">추천 액션</text>
  <text x="632" y="264" font-size="9.5" fill="#444">지연 정당성·인력 재배치안</text>
  <text x="632" y="278" font-size="9.5" fill="#444">경쟁사 모니터링 강화</text>
  <line x1="570" y1="150" x2="618" y2="130" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6ia_ar)"/>
  <line x1="570" y1="188" x2="618" y2="185" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6ia_ar)"/>
  <line x1="570" y1="226" x2="618" y2="250" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#vca6ia_ar)"/>

  <!-- 승인 후 반영 -->
  <rect x="40" y="312" width="830" height="46" rx="11" fill="#ede9fe" stroke="#a78bda"/>
  <text x="60" y="340" font-size="11.5" font-weight="700" fill="#7c3aed">사람 승인 후에만 자동 반영</text>
  <text x="300" y="340" font-size="10" fill="#444">로드맵 문서 · Task Master 일정 · Linear 마일스톤 · Notion 분기 페이지 · Slack 공지 일괄 갱신</text>
</svg>
