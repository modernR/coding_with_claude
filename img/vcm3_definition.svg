<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">서브에이전트 정의 파일 — frontmatter + 시스템 프롬프트</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">.claude/agents/ 폴더의 마크다운 한 장 = 전문가 한 명. 상단 설정 + 본문 지시.</text>

  <!-- location -->
  <rect x="40" y="90" width="380" height="60" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="114" font-size="11" font-weight="700" fill="#1a1a1a">글로벌: ~/.claude/agents/</text>
  <text x="56" y="136" font-size="11" font-weight="700" fill="#1a1a1a">프로젝트: &lt;프로젝트&gt;/.claude/agents/</text>
  <rect x="440" y="90" width="420" height="60" rx="10" fill="#fff7e6" stroke="#f3d488"/>
  <text x="456" y="114" font-size="10.5" fill="#444">name / description / tools / model 이 핵심 4개.</text>
  <text x="456" y="136" font-size="10.5" fill="#444">description은 메인의 자동 분배 판단 기준 — 정확·명확하게.</text>

  <!-- frontmatter box -->
  <rect x="40" y="170" width="380" height="240" rx="11" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="60" y="196" font-size="13" font-weight="700" fill="#3a6fd6">frontmatter 필드</text>
  <text x="60" y="222" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">name</tspan>  소문자·숫자·하이픈 고유 이름</text>
  <text x="60" y="244" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">description</tspan>  언제 호출되는지 (자동 분배 기준)</text>
  <text x="60" y="266" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">tools</tspan>  쓸 수 있는 도구 배열 (미지정=전체)</text>
  <text x="60" y="288" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">model</tspan>  sonnet / haiku / opus</text>
  <text x="60" y="310" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">disallowedTools</tspan>  차단할 도구 배열</text>
  <text x="60" y="332" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">permissionMode</tspan>  default / acceptEdits / dontAsk</text>
  <text x="60" y="354" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">maxTurns</tspan>  최대 턴 수 (무한 루프 방지)</text>
  <text x="60" y="376" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">skills</tspan>  시작 시 주입할 스킬 목록</text>
  <text x="60" y="398" font-size="10.5" fill="#1a1a1a"><tspan font-weight="700">isolation</tspan>  worktree = Git 격리 실행 (충돌 방지)</text>

  <!-- system prompt box -->
  <rect x="440" y="170" width="420" height="240" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="460" y="196" font-size="13" font-weight="700" fill="#1a7f37">본문 = 시스템 프롬프트</text>
  <text x="460" y="222" font-size="10.5" fill="#444">"당신은 시니어 풀스택 엔지니어. 다음 4관점</text>
  <text x="460" y="238" font-size="10.5" fill="#444"> 으로 코드 리뷰."</text>
  <text x="460" y="264" font-size="10.5" fill="#444">1. 품질  가독성·이름·중복</text>
  <text x="460" y="284" font-size="10.5" fill="#444">2. 버그  명백한 오류·엣지 케이스</text>
  <text x="460" y="304" font-size="10.5" fill="#444">3. 보안  비밀 키 노출·SQL 주입·XSS</text>
  <text x="460" y="324" font-size="10.5" fill="#444">4. 성능  불필요한 루프·N+1</text>
  <text x="460" y="352" font-size="10.5" fill="#444">각 발견을 심각도·위치·제안과 함께, 종합 판정.</text>
  <rect x="460" y="368" width="380" height="30" rx="6" fill="#ffffff" stroke="#cfe9d7"/>
  <text x="472" y="388" font-size="9.5" fill="#6b6b6b">적정 길이 1500~3000자. 긴 규칙은 별도 reference 파일로.</text>
</svg>
