  <text x="115" y="162" font-size="9.5" fill="#6b6b6b" text-anchor="middle">participants INSERT</text>

  <line x1="190" y1="145" x2="228" y2="145" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm6ef)"/>

  <rect x="232" y="110" width="150" height="70" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="307" y="140" font-size="11.5" font-weight="700" fill="#b8860b" text-anchor="middle">DB 트리거</text>
  <text x="307" y="162" font-size="9.5" fill="#6b6b6b" text-anchor="middle">함수 자동 호출</text>

  <line x1="382" y1="145" x2="420" y2="145" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm6ef)"/>

  <rect x="424" y="110" width="200" height="70" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="524" y="138" font-size="11.5" font-weight="700" fill="#7c3aed" text-anchor="middle">Edge Function</text>
  <text x="524" y="158" font-size="9.5" fill="#444" text-anchor="middle">send-rsvp-confirmation</text>
  <text x="524" y="173" font-size="9" fill="#6b6b6b" text-anchor="middle">키는 secrets에서</text>

  <line x1="624" y1="145" x2="662" y2="145" stroke="#9aa0a6" stroke-width="1.5" marker-end="url(#gm6ef)"/>

