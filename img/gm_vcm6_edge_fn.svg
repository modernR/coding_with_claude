  <text x="40" y="65" font-size="14" fill="#6b6b6b">클라이언트에 두면 위험하거나 무거운 로직을 서버로 옮깁니다. 비밀 키는 secrets에 보관.</text>

  <defs><marker id="gm6ef" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <rect x="40" y="110" width="150" height="70" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
