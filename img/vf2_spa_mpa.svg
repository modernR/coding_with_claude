<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="880" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">MPA vs SPA — 페이지를 '어떻게 넘기나'</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">화면을 이동할 때 '전체를 새로 받느냐, 필요한 부분만 바꾸느냐'의 차이.</text>

  <defs><marker id="sm" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <!-- MPA -->
  <rect x="36" y="92" width="392" height="170" rx="12" fill="#f4f5f7" stroke="#d9dde3"/>
  <text x="56" y="118" font-size="15" font-weight="700" fill="#555">MPA — 여러 페이지</text>
  <text x="56" y="138" font-size="11" fill="#6b6b6b">이동할 때마다 서버에서 새 HTML 전체를 받아 새로고침</text>
  <g text-anchor="middle" font-size="11">
    <rect x="60" y="156" width="86" height="60" rx="8" fill="#ffffff" stroke="#d9dde3"/><text x="103" y="190" fill="#1a1a1a">페이지 A</text>
    <rect x="176" y="156" width="86" height="60" rx="8" fill="#ffffff" stroke="#d9dde3"/><text x="219" y="190" fill="#1a1a1a">페이지 B</text>
    <rect x="292" y="156" width="86" height="60" rx="8" fill="#ffffff" stroke="#d9dde3"/><text x="335" y="190" fill="#1a1a1a">페이지 C</text>
  </g>
  <line x1="146" y1="186" x2="174" y2="186" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sm)"/>
  <line x1="262" y1="186" x2="290" y2="186" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sm)"/>
  <text x="232" y="238" font-size="10.5" fill="#b00020" text-anchor="middle">매 이동 = 전체 새로고침(깜빡임) · 서버가 매번 HTML 생성</text>

  <!-- SPA -->
  <rect x="452" y="92" width="392" height="170" rx="12" fill="#fdeef1" stroke="#f7c0c8"/>
  <text x="472" y="118" font-size="15" font-weight="700" fill="#E8344E">SPA — 한 페이지</text>
  <text x="472" y="138" font-size="11" fill="#6b6b6b">첫 로드 후, 이동은 JS가 '필요한 부분만' 교체(새로고침 없음)</text>
  <rect x="476" y="156" width="120" height="86" rx="8" fill="#ffffff" stroke="#f7c0c8"/><text x="536" y="174" font-size="11" fill="#6b6b6b" text-anchor="middle">앱 껍데기(1회 로드)</text>
  <rect x="492" y="186" width="88" height="44" rx="6" fill="#fdeef1" stroke="#f7c0c8"/><text x="536" y="212" font-size="10.5" fill="#E8344E" text-anchor="middle">내용 영역만 교체</text>
  <g text-anchor="middle" font-size="10.5">
    <rect x="620" y="160" width="80" height="30" rx="6" fill="#ffffff" stroke="#f7c0c8"/><text x="660" y="180" fill="#1a1a1a">화면 A</text>
    <rect x="620" y="196" width="80" height="30" rx="6" fill="#ffffff" stroke="#f7c0c8"/><text x="660" y="216" fill="#1a1a1a">화면 B</text>
    <rect x="716" y="178" width="110" height="30" rx="6" fill="#eaf6ee" stroke="#bfe3cb"/><text x="771" y="198" fill="#1a7f37">JS가 갈아끼움</text>
  </g>
  <line x1="580" y1="208" x2="618" y2="185" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sm)"/>
  <line x1="580" y1="208" x2="618" y2="210" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sm)"/>
  <text x="648" y="252" font-size="10.5" fill="#1a7f37" text-anchor="middle">이동이 매끄럽고 빠름 · 서버 부하↓</text>

  <!-- 비교 -->
  <rect x="36" y="278" width="808" height="86" rx="8" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="300" font-size="12" font-weight="700" fill="#1a1a1a">한눈에</text>
  <text x="56" y="322" font-size="11.5" fill="#444">· 첫 로드: MPA 가벼움 / SPA 무거울 수 있음   · 전환: MPA 새로고침 / SPA 매끄러움   · SEO: MPA 유리 / SPA 별도 대비</text>
  <text x="56" y="342" font-size="11.5" fill="#6b6b6b">※ 보통 <tspan font-weight="700">SPA는 CSR</tspan>(브라우저 렌더)와, <tspan font-weight="700">MPA는 서버 렌더(SSR/SSG)</tspan> 와 짝지어집니다(다음 절 렌더링 모드로 연결).</text>
</svg>
