<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="380" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">PR 자동 분류·라우팅 흐름</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">"검증 → 분기" 패턴. 변경 영역에 따라 라벨·리뷰어·우선순위를 자동 배정합니다.</text>

  <defs>
    <marker id="pr_a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- PR 열림 -->
  <rect x="40" y="150" width="150" height="70" rx="11" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="115" y="180" font-size="12.5" font-weight="700" fill="#1a1a1a" text-anchor="middle">PR 열림</text>
  <text x="115" y="200" font-size="9.5" fill="#6b6b6b" text-anchor="middle">변경 파일 분석</text>

  <!-- 5 routes -->
  <rect x="290" y="90" width="240" height="34" rx="8" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="305" y="112" font-size="10" fill="#3a6fd6">frontend/·.tsx → 프론트팀 + UI 디자이너</text>

  <rect x="290" y="132" width="240" height="34" rx="8" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="305" y="154" font-size="10" fill="#1a7f37">backend/·.py → 백엔드팀 + 보안팀</text>

  <rect x="290" y="174" width="240" height="34" rx="8" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="305" y="196" font-size="10" fill="#b00020">migrations/ → DBA팀 (필수 승인)</text>

  <rect x="290" y="216" width="240" height="34" rx="8" fill="#ede9fe" stroke="#a78bda"/>
  <text x="305" y="238" font-size="10" fill="#7c3aed">i18n/·.po → 로컬라이제이션팀</text>

  <rect x="290" y="258" width="240" height="34" rx="8" fill="#fff7e6" stroke="#f3d488"/>
  <text x="305" y="280" font-size="10" fill="#b8860b">package.json → 보안팀 + 라이선스</text>

  <line x1="190" y1="185" x2="286" y2="107" stroke="#9aa0a6" stroke-width="1.3" marker-end="url(#pr_a)"/>
  <line x1="190" y1="185" x2="286" y2="149" stroke="#9aa0a6" stroke-width="1.3" marker-end="url(#pr_a)"/>
  <line x1="190" y1="185" x2="286" y2="191" stroke="#9aa0a6" stroke-width="1.3" marker-end="url(#pr_a)"/>
  <line x1="190" y1="185" x2="286" y2="233" stroke="#9aa0a6" stroke-width="1.3" marker-end="url(#pr_a)"/>
  <line x1="190" y1="185" x2="286" y2="275" stroke="#9aa0a6" stroke-width="1.3" marker-end="url(#pr_a)"/>

  <!-- 우선순위 -->
  <rect x="620" y="120" width="240" height="140" rx="11" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="740" y="145" font-size="12" font-weight="700" fill="#6b6b6b" text-anchor="middle">우선순위 자동 결정</text>
  <rect x="636" y="158" width="208" height="24" rx="6" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="740" y="175" font-size="9.5" fill="#b00020" text-anchor="middle">security·incident → critical</text>
  <rect x="636" y="188" width="208" height="24" rx="6" fill="#fff7e6" stroke="#f3d488"/>
  <text x="740" y="205" font-size="9.5" fill="#b8860b" text-anchor="middle">db-migration → high</text>
  <rect x="636" y="218" width="208" height="24" rx="6" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="740" y="235" font-size="9.5" fill="#3a6fd6" text-anchor="middle">front + back → medium</text>

  <line x1="530" y1="190" x2="616" y2="190" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#pr_a)"/>

  <text x="450" y="335" font-size="11" fill="#6b6b6b" text-anchor="middle">라벨·리뷰어 자동 할당 + 우선순위 → Slack 알림 · 대시보드 표시</text>
  <text x="450" y="356" font-size="10.5" fill="#6b6b6b" text-anchor="middle">RSVP 정원 마이그레이션 포함 PR — DBA 필수 리뷰어 + 우선순위 high 자동 상승</text>
</svg>
