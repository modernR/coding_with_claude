<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">CI/CD 파이프라인 — push부터 배포까지</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">PR을 열 때마다 GitHub Actions가 검사를 돌리고, 통과해야만 머지·배포로 넘어갑니다.</text>

  <defs>
    <marker id="vcm6c_arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- push -->
  <rect x="40" y="150" width="120" height="60" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="100" y="176" font-size="12" font-weight="700" fill="#3a6fd6" text-anchor="middle">git push</text>
  <text x="100" y="196" font-size="10" fill="#444" text-anchor="middle">feature/* → PR</text>

  <!-- CI box -->
  <rect x="200" y="100" width="290" height="200" rx="12" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="345" y="126" font-size="13" font-weight="700" fill="#b8860b" text-anchor="middle">CI — GitHub Actions</text>
  <rect x="222" y="140" width="118" height="42" rx="7" fill="#ffffff" stroke="#f0d6b8"/>
  <text x="281" y="160" font-size="10" fill="#444" text-anchor="middle">lint / format</text>
  <text x="281" y="175" font-size="9" fill="#6b6b6b" text-anchor="middle">ESLint·Prettier</text>
  <rect x="350" y="140" width="118" height="42" rx="7" fill="#ffffff" stroke="#f0d6b8"/>
  <text x="409" y="160" font-size="10" fill="#444" text-anchor="middle">typecheck</text>
  <text x="409" y="175" font-size="9" fill="#6b6b6b" text-anchor="middle">tsc --noEmit</text>
  <rect x="222" y="192" width="118" height="42" rx="7" fill="#ffffff" stroke="#f0d6b8"/>
  <text x="281" y="212" font-size="10" fill="#444" text-anchor="middle">test</text>
  <text x="281" y="227" font-size="9" fill="#6b6b6b" text-anchor="middle">Jest·Vitest</text>
  <rect x="350" y="192" width="118" height="42" rx="7" fill="#ffffff" stroke="#f0d6b8"/>
  <text x="409" y="212" font-size="10" fill="#444" text-anchor="middle">build</text>
  <text x="409" y="227" font-size="9" fill="#6b6b6b" text-anchor="middle">next build</text>
  <text x="345" y="262" font-size="9.5" fill="#6b6b6b" text-anchor="middle">Node 22 · npm ci · Secrets 주입</text>
  <text x="345" y="282" font-size="9.5" fill="#6b6b6b" text-anchor="middle">4단계를 병렬·순차로 자동 실행</text>

  <!-- gate -->
  <rect x="530" y="130" width="120" height="140" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="590" y="156" font-size="12" font-weight="700" fill="#b00020" text-anchor="middle">모두 통과?</text>
  <text x="590" y="196" font-size="10.5" fill="#b00020" text-anchor="middle">✕ 실패</text>
  <text x="590" y="214" font-size="9.5" fill="#444" text-anchor="middle">머지 차단</text>
  <text x="590" y="240" font-size="10.5" fill="#1a7f37" text-anchor="middle">✓ 통과</text>
  <text x="590" y="258" font-size="9.5" fill="#444" text-anchor="middle">다음 단계</text>

  <!-- preview -->
  <rect x="690" y="110" width="170" height="70" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="775" y="136" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">Preview 배포</text>
  <text x="775" y="156" font-size="9.5" fill="#444" text-anchor="middle">Vercel PR별 URL</text>
  <text x="775" y="171" font-size="9.5" fill="#444" text-anchor="middle">리뷰·QA·데모</text>

  <!-- prod -->
  <rect x="690" y="220" width="170" height="70" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="775" y="246" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">Production 배포</text>
  <text x="775" y="266" font-size="9.5" fill="#444" text-anchor="middle">main 머지 시 자동</text>
  <text x="775" y="281" font-size="9.5" fill="#444" text-anchor="middle">운영 DB·운영 키</text>

  <line x1="160" y1="180" x2="196" y2="185" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6c_arr)"/>
  <line x1="490" y1="190" x2="526" y2="192" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6c_arr)"/>
  <line x1="650" y1="165" x2="686" y2="150" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6c_arr)"/>
  <path d="M775,180 L775,218" stroke="#9aa0a6" stroke-width="1.8" marker-end="url(#vcm6c_arr)"/>
  <text x="748" y="205" font-size="9" fill="#6b6b6b">승인·머지</text>

  <text x="450" y="345" font-size="10.5" fill="#444" text-anchor="middle">검증을 사람이 아니라 기계가 반복 수행하므로, "깜빡한 lint" 같은 실수가 main에 들어가지 않습니다.</text>
  <text x="450" y="366" font-size="10" fill="#6b6b6b" text-anchor="middle">CI = 지속적 통합(검사 자동화) · CD = 지속적 배포(머지 후 자동 배포)</text>
</svg>
