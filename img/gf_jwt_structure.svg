<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="340" fill="#ffffff"/>
  <text x="40" y="38" font-size="21" font-weight="700" fill="#1a1a1a">JWT의 구조 — 점(.)으로 나뉜 세 조각</text>
  <text x="40" y="62" font-size="14" fill="#6b6b6b">Header . Payload . Signature 를 이어 붙인 문자열입니다. 앞 두 조각은 누구나 열어볼 수 있고, 위조는 서명이 막습니다.</text>

  <!-- encoded string -->
  <rect x="40" y="86" width="820" height="34" rx="7" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="52" y="108" font-size="12" font-family="monospace"><tspan fill="#b00020">eyJhbGciOiJIUzI1NiJ9</tspan><tspan fill="#9aa0a6">.</tspan><tspan fill="#3a6fd6">eyJzdWIiOiI0NTYiLCJyb2xlIjoiaG9zdCJ9</tspan><tspan fill="#9aa0a6">.</tspan><tspan fill="#1a7f37">Zx8kQp3rT9v0aB</tspan></text>

  <!-- 3 decoded boxes -->
  <rect x="40" y="140" width="266" height="150" rx="10" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="56" y="164" font-size="12.5" font-weight="700" fill="#b00020">① Header (헤더)</text>
  <text x="56" y="184" font-size="10" fill="#6b6b6b">어떤 방식으로 서명했나</text>
  <rect x="56" y="194" width="234" height="82" rx="6" fill="#ffffff" stroke="#f3c9cf"/>
  <text x="66" y="214" font-size="10.5" font-family="monospace" fill="#1a1a1a">{</text>
  <text x="76" y="230" font-size="10.5" font-family="monospace" fill="#1a1a1a">"alg": "HS256",</text>
  <text x="76" y="246" font-size="10.5" font-family="monospace" fill="#1a1a1a">"typ": "JWT"</text>
  <text x="66" y="262" font-size="10.5" font-family="monospace" fill="#1a1a1a">}</text>

  <rect x="317" y="140" width="266" height="150" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="333" y="164" font-size="12.5" font-weight="700" fill="#3a6fd6">② Payload (내용)</text>
  <text x="333" y="184" font-size="10" fill="#6b6b6b">누구인지·권한·만료 시각</text>
  <rect x="333" y="194" width="234" height="82" rx="6" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="343" y="212" font-size="10.5" font-family="monospace" fill="#1a1a1a">{ "sub": "456",</text>
  <text x="343" y="228" font-size="10.5" font-family="monospace" fill="#1a1a1a">  "name": "김호스트",</text>
  <text x="343" y="244" font-size="10.5" font-family="monospace" fill="#1a1a1a">  "role": "host",</text>
  <text x="343" y="260" font-size="10.5" font-family="monospace" fill="#1a1a1a">  "exp": 1735689600 }</text>

  <rect x="594" y="140" width="266" height="150" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="610" y="164" font-size="12.5" font-weight="700" fill="#1a7f37">③ Signature (서명)</text>
  <text x="610" y="184" font-size="10" fill="#6b6b6b">위조를 막는 자물쇠</text>
  <rect x="610" y="194" width="234" height="82" rx="6" fill="#ffffff" stroke="#cfe9d7"/>
  <text x="620" y="214" font-size="9.3" font-family="monospace" fill="#1a1a1a">HMAC_SHA256(</text>
  <text x="620" y="230" font-size="9.3" font-family="monospace" fill="#1a1a1a">  header + "." + payload,</text>
  <text x="620" y="246" font-size="9.3" font-family="monospace" fill="#1a1a1a">  서버만 아는 비밀키 )</text>
  <text x="620" y="266" font-size="9" fill="#1a7f37">→ 내용을 1글자만 바꿔도 서명 불일치</text>

  <text x="40" y="312" font-size="11" fill="#1a1a1a">주의: ①②는 Base64로 '인코딩'만 된 것이라 <tspan font-weight="700">암호화가 아닙니다</tspan> — 비밀번호·주민번호를 payload에 넣지 마세요.</text>
  <text x="40" y="330" font-size="11" fill="#b00020">서버는 ③ 서명만 다시 계산해 맞는지 확인하므로, 세션을 따로 저장하지 않아도 '진짜 발급한 토큰'인지 즉시 검증됩니다.</text>
</svg>
