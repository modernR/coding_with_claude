<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">외부 작업관리의 5가지 함정과 해결</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">자동화가 강할수록 검토·기준·역할을 사람이 잡아줘야 어긋나지 않습니다.</text>

  <!-- row 1 -->
  <rect x="40" y="95" width="400" height="66" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="118" font-size="11.5" font-weight="700" fill="#b00020">① 너무 잘게 분해됨</text>
  <text x="56" y="137" font-size="9.5" fill="#444">100+개인데 각 30분 · 관리 비용 &gt; 작업</text>
  <text x="56" y="154" font-size="9.5" fill="#1a7f37">해결 · 평균 4~8시간 단위로, 더 작은 건 sub-task</text>

  <rect x="460" y="95" width="400" height="66" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="476" y="118" font-size="11.5" font-weight="700" fill="#b00020">② 의존 관계 부정확</text>
  <text x="476" y="137" font-size="9.5" fill="#444">AI 오추론 → 잘못된 순서로 진행</text>
  <text x="476" y="154" font-size="9.5" fill="#1a7f37">해결 · 첫 분해 후 사람 검토·승인 필수(PR처럼)</text>

  <!-- row 2 -->
  <rect x="40" y="175" width="400" height="66" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="198" font-size="11.5" font-weight="700" fill="#b00020">③ 동기화 충돌</text>
  <text x="56" y="217" font-size="9.5" fill="#444">Linear ↔ task-master 반영 안 됨·모순</text>
  <text x="56" y="234" font-size="9.5" fill="#1a7f37">해결 · 한 쪽 master, 다른 쪽 read-only · 시점 명확</text>

  <rect x="460" y="175" width="400" height="66" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="476" y="198" font-size="11.5" font-weight="700" fill="#b00020">④ 우선순위가 매번 바뀜</text>
  <text x="476" y="217" font-size="9.5" fill="#444">환경 변화로 AI가 매일 다른 것 추천</text>
  <text x="476" y="234" font-size="9.5" fill="#1a7f37">해결 · 사람이 분기 우선순위 고정 · AI는 주·일만</text>

  <!-- row 3 wide -->
  <rect x="40" y="255" width="820" height="66" rx="10" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="56" y="278" font-size="11.5" font-weight="700" fill="#b8860b">⑤ PM 가치의 평가절하 — "AI가 다 하니 PM 불필요"라는 잘못된 인식</text>
  <text x="56" y="298" font-size="9.5" fill="#444">해결 · PM 역할이 운영자 → 전략 결정자로 이동</text>
  <text x="56" y="315" font-size="9.5" fill="#444">AI가 못 하는 비즈니스 판단·이해관계자 협상에 시간을 더 씁니다.</text>

  <!-- footer principle -->
  <rect x="40" y="335" width="820" height="46" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="56" y="357" font-size="11" font-weight="700" fill="#3a6fd6">공통 원칙</text>
  <text x="56" y="375" font-size="9.5" fill="#444">AI는 분해·추론·집계를 빠르게, 사람은 검토·기준 고정·전략 판단을 · 자동화의 마지막 문은 언제나 사람이 잡습니다.</text>
</svg>
