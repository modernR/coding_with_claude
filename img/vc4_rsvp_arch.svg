<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">이벤트 RSVP 웹앱 — 결과물 아키텍처</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">프론트(Next.js)·백엔드(Supabase)·배포(Vercel)·버전관리(Git)의 풀세트 한 사이클.</text>

  <defs><marker id="rv" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <rect x="40" y="110" width="150" height="80" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="115" y="140" font-size="12.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">사용자 브라우저</text>
  <text x="115" y="162" font-size="9.5" fill="#6b6b6b" text-anchor="middle">이벤트 목록·상세</text>
  <text x="115" y="177" font-size="9.5" fill="#6b6b6b" text-anchor="middle">RSVP 폼</text>

  <rect x="250" y="110" width="160" height="80" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="330" y="140" font-size="12.5" font-weight="700" fill="#7c3aed" text-anchor="middle">Next.js 앱</text>
  <text x="330" y="162" font-size="9.5" fill="#6b6b6b" text-anchor="middle">Vercel에 배포</text>
  <text x="330" y="177" font-size="9.5" fill="#6b6b6b" text-anchor="middle">+ Supabase JS</text>

  <rect x="470" y="110" width="160" height="80" rx="10" fill="#fff7e6" stroke="#f3d488"/>
  <text x="550" y="140" font-size="12.5" font-weight="700" fill="#b8860b" text-anchor="middle">RLS 정책</text>
  <text x="550" y="162" font-size="9.5" fill="#6b6b6b" text-anchor="middle">anon: 모두 읽기</text>
  <text x="550" y="177" font-size="9.5" fill="#6b6b6b" text-anchor="middle">+ 누구나 RSVP</text>

  <rect x="690" y="110" width="170" height="80" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="775" y="140" font-size="12.5" font-weight="700" fill="#1a7f37" text-anchor="middle">PostgreSQL</text>
  <text x="775" y="162" font-size="9.5" fill="#6b6b6b" text-anchor="middle">Supabase DB</text>
  <text x="775" y="177" font-size="9.5" fill="#6b6b6b" text-anchor="middle">events · participants</text>

  <line x1="190" y1="140" x2="248" y2="140" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#rv)"/>
  <text x="219" y="132" font-size="8.5" fill="#6b6b6b" text-anchor="middle">HTTPS</text>
  <line x1="410" y1="140" x2="468" y2="140" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#rv)"/>
  <line x1="630" y1="140" x2="688" y2="140" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#rv)"/>
  <text x="659" y="132" font-size="8.5" fill="#1a7f37" text-anchor="middle">허용</text>
  <line x1="688" y1="170" x2="412" y2="170" stroke="#9aa0a6" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#rv)"/>
  <text x="550" y="185" font-size="8.5" fill="#6b6b6b" text-anchor="middle">결과 JSON 되돌아옴</text>

  <rect x="40" y="220" width="820" height="76" rx="9" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="244" font-size="12" font-weight="700" fill="#1a1a1a">사용자 흐름</text>
  <text x="56" y="266" font-size="11" fill="#444">① Vercel URL 접속 → ② 메인에서 이벤트 카드 목록 → ③ 클릭 시 상세(정보+참가자 명단+RSVP 폼)</text>
  <text x="56" y="286" font-size="11" fill="#444">→ ④ 폼 제출 시 participants에 기록되고 명단에 즉시 반영. (참가자 명단은 익명 공개 = '공개 RSVP')</text>
</svg>
