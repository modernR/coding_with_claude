<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">SBOM·라이선스 자동 감사 흐름</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">패키지 변경 직후 자동 감사. Critical은 차단, High·비허용 라이선스는 경고.</text>

  <defs>
    <marker id="sb_a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- trigger -->
  <rect x="40" y="110" width="150" height="56" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="115" y="135" font-size="11.5" font-weight="700" fill="#1a1a1a" text-anchor="middle">패키지 변경</text>
  <text x="115" y="153" font-size="9.5" fill="#6b6b6b" text-anchor="middle">npm install / yarn add</text>

  <!-- SBOM 생성 -->
  <rect x="240" y="110" width="150" height="56" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="315" y="135" font-size="11.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">SBOM 생성</text>
  <text x="315" y="153" font-size="9.5" fill="#444" text-anchor="middle">CycloneDX</text>

  <!-- 취약점 검사 -->
  <rect x="440" y="110" width="160" height="56" rx="10" fill="#fff7e6" stroke="#f3d488"/>
  <text x="520" y="135" font-size="11.5" font-weight="700" fill="#b8860b" text-anchor="middle">취약점 검사</text>
  <text x="520" y="153" font-size="9.5" fill="#444" text-anchor="middle">npm audit</text>

  <!-- 라이선스 감사 -->
  <rect x="650" y="110" width="160" height="56" rx="10" fill="#ede9fe" stroke="#a78bda"/>
  <text x="730" y="135" font-size="11.5" font-weight="700" fill="#7c3aed" text-anchor="middle">라이선스 감사</text>
  <text x="730" y="153" font-size="9.5" fill="#444" text-anchor="middle">허용 목록 대조</text>

  <line x1="190" y1="138" x2="236" y2="138" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sb_a)"/>
  <line x1="390" y1="138" x2="436" y2="138" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sb_a)"/>
  <line x1="600" y1="138" x2="646" y2="138" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#sb_a)"/>

  <!-- outcomes -->
  <rect x="60" y="230" width="240" height="80" rx="11" fill="#fff5f6" stroke="#f3c9cf"/>
  <text x="180" y="256" font-size="12" font-weight="700" fill="#b00020" text-anchor="middle">Critical 취약점</text>
  <text x="180" y="278" font-size="10.5" fill="#444" text-anchor="middle">→ 설치 차단 (exit 1)</text>
  <text x="180" y="296" font-size="9.5" fill="#6b6b6b" text-anchor="middle">action: "block"</text>

  <rect x="330" y="230" width="240" height="80" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="450" y="256" font-size="12" font-weight="700" fill="#b8860b" text-anchor="middle">High · 비허용 라이선스</text>
  <text x="450" y="278" font-size="10.5" fill="#444" text-anchor="middle">→ 경고 (검토 권장)</text>
  <text x="450" y="296" font-size="9.5" fill="#6b6b6b" text-anchor="middle">action: "warn"</text>

  <rect x="600" y="230" width="240" height="80" rx="11" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="720" y="256" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="middle">이상 없음</text>
  <text x="720" y="278" font-size="10.5" fill="#444" text-anchor="middle">→ 통과 · SBOM 기록</text>
  <text x="720" y="296" font-size="9.5" fill="#6b6b6b" text-anchor="middle">허용: MIT·Apache·BSD·ISC</text>

  <line x1="380" y1="166" x2="200" y2="226" stroke="#9aa0a6" stroke-width="1.4" marker-end="url(#sb_a)"/>
  <line x1="520" y1="166" x2="470" y2="226" stroke="#9aa0a6" stroke-width="1.4" marker-end="url(#sb_a)"/>
  <line x1="730" y1="166" x2="720" y2="226" stroke="#9aa0a6" stroke-width="1.4" marker-end="url(#sb_a)"/>
</svg>
