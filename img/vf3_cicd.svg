<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="880" height="280" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">CI/CD — 커밋이 사용자에게 닿기까지 (약 30분, 자동)</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">코드 변경 → 자동 검사 → 통과하면 자동 배포. 실패하면 멈추고 개발자에게 알림.</text>

  <defs><marker id="ci" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker></defs>

  <g text-anchor="middle" font-size="11">
    <rect x="30" y="120" width="104" height="54" rx="9" fill="#eef3fd" stroke="#bcd0f5"/><text x="82" y="146" font-weight="700" fill="#3a6fd6">커밋·푸시</text><text x="82" y="163" font-size="9.5" fill="#6b6b6b">GitHub</text>
    <rect x="152" y="120" width="104" height="54" rx="9" fill="#fff7e6" stroke="#f3d488"/><text x="204" y="142" font-weight="700" fill="#b8860b">① 린트</text><text x="204" y="160" font-size="9.5" fill="#6b6b6b">문법·스타일</text>
    <rect x="274" y="120" width="104" height="54" rx="9" fill="#fff7e6" stroke="#f3d488"/><text x="326" y="142" font-weight="700" fill="#b8860b">② 단위 테스트</text><text x="326" y="160" font-size="9.5" fill="#6b6b6b">함수별 검증</text>
    <rect x="396" y="120" width="104" height="54" rx="9" fill="#fff7e6" stroke="#f3d488"/><text x="448" y="142" font-weight="700" fill="#b8860b">③ 통합 테스트</text><text x="448" y="160" font-size="9.5" fill="#6b6b6b">전체 흐름</text>
    <rect x="518" y="120" width="104" height="54" rx="9" fill="#eef3fd" stroke="#bcd0f5"/><text x="570" y="142" font-weight="700" fill="#3a6fd6">④ 빌드</text><text x="570" y="160" font-size="9.5" fill="#6b6b6b">Docker 이미지</text>
    <rect x="640" y="120" width="104" height="54" rx="9" fill="#fdeef1" stroke="#f7c0c8"/><text x="692" y="142" font-weight="700" fill="#E8344E">⑤ 배포</text><text x="692" y="160" font-size="9.5" fill="#6b6b6b">운영 서버</text>
    <rect x="762" y="120" width="104" height="54" rx="9" fill="#f1faf3" stroke="#cfe9d7"/><text x="814" y="146" font-weight="700" fill="#1a7f37">사용자</text><text x="814" y="163" font-size="9.5" fill="#6b6b6b">새 기능 사용</text>
  </g>
  <g stroke="#9aa0a6" stroke-width="1.8">
    <line x1="134" y1="147" x2="150" y2="147" marker-end="url(#ci)"/>
    <line x1="256" y1="147" x2="272" y2="147" marker-end="url(#ci)"/>
    <line x1="378" y1="147" x2="394" y2="147" marker-end="url(#ci)"/>
    <line x1="500" y1="147" x2="516" y2="147" marker-end="url(#ci)"/>
    <line x1="622" y1="147" x2="638" y2="147" marker-end="url(#ci)"/>
    <line x1="744" y1="147" x2="760" y2="147" marker-end="url(#ci)"/>
  </g>
  <text x="326" y="205" font-size="11" fill="#b00020" text-anchor="middle">↑ 어느 단계든 실패하면 자동 중단 → 개발자에게 알림 → 수정</text>
  <text x="40" y="250" font-size="12" fill="#6b6b6b">CI = 변경을 자동 테스트·병합 · CD = 통과 시 자동 배포. 덕분에 "버그 고쳤어요? → 1시간 뒤 반영"이 가능.</text>
</svg>
