<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">컨텍스트 윈도우의 5가지 점유자</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">Sonnet 4.6의 1M 윈도우 — 세션을 시작하기도 전에 50~250K가 이미 차 있습니다.</text>

  <defs>
    <marker id="cw_a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <rect x="40" y="95" width="470" height="250" rx="12" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="60" y="120" font-size="12" font-weight="700" fill="#6b6b6b">1M 토큰 컨텍스트 윈도우</text>

  <rect x="60" y="132" width="430" height="36" rx="8" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="76" y="155" font-size="11" font-weight="700" fill="#3a6fd6">시스템 프롬프트 (Claude 자체)</text>
  <text x="470" y="155" font-size="10.5" fill="#444" text-anchor="end">10~50K · 고정</text>

  <rect x="60" y="174" width="430" height="36" rx="8" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="76" y="197" font-size="11" font-weight="700" fill="#b8860b">MCP 메타데이터</text>
  <text x="470" y="197" font-size="10.5" fill="#444" text-anchor="end">5~150K · 가변</text>

  <rect x="60" y="216" width="430" height="36" rx="8" fill="#ede9fe" stroke="#a78bda"/>
  <text x="76" y="239" font-size="11" font-weight="700" fill="#7c3aed">CLAUDE.md (글로벌·프로젝트)</text>
  <text x="470" y="239" font-size="10.5" fill="#444" text-anchor="end">2~20K · 고정</text>

  <rect x="60" y="258" width="430" height="36" rx="8" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="76" y="281" font-size="11" font-weight="700" fill="#1a7f37">Auto Memory</text>
  <text x="470" y="281" font-size="10.5" fill="#444" text-anchor="end">5~30K · 가변</text>

  <rect x="60" y="300" width="430" height="36" rx="8" fill="#fdecef" stroke="#f3c0cb"/>
  <text x="76" y="323" font-size="11" font-weight="700" fill="#b00020">대화 + 도구 호출 결과</text>
  <text x="470" y="323" font-size="10.5" fill="#444" text-anchor="end">가변 · 계속 증가</text>

  <line x1="516" y1="220" x2="556" y2="220" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#cw_a)"/>

  <rect x="565" y="120" width="295" height="100" rx="11" fill="#fff7e6" stroke="#f3d488"/>
  <text x="712" y="150" font-size="12" font-weight="700" fill="#b8860b" text-anchor="middle">세션 시작 시점</text>
  <text x="712" y="176" font-size="11" fill="#444" text-anchor="middle">이미 50~250K 점유</text>
  <text x="712" y="198" font-size="9.5" fill="#6b6b6b" text-anchor="middle">고정+가변 점유자의 합</text>

  <rect x="565" y="232" width="295" height="104" rx="11" fill="#fdecef" stroke="#f3c0cb"/>
  <text x="712" y="262" font-size="12" font-weight="700" fill="#b00020" text-anchor="middle">큰 작업 진행 중</text>
  <text x="712" y="288" font-size="11" fill="#444" text-anchor="middle">600K+ 도달</text>
  <text x="712" y="310" font-size="9.5" fill="#6b6b6b" text-anchor="middle">→ 응답 품질 저하</text>

  <text x="712" y="380" font-size="10.5" fill="#6b6b6b" text-anchor="middle">가변 점유자(MCP·메모리·대화)를 관리하는 것이 컨텍스트 엔지니어링</text>
</svg>
