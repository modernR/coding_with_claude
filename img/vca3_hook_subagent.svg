<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="340" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">훅 + 서브에이전트 — 빠른 검사와 깊은 감사의 분업</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">훅은 2초 내 문지기, 서브에이전트는 격리 컨텍스트의 감사관.</text>

  <defs>
    <marker id="hs_a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- 파일 저장 -->
  <rect x="40" y="130" width="130" height="56" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="105" y="155" font-size="11.5" font-weight="700" fill="#1a1a1a" text-anchor="middle">파일 저장</text>
  <text x="105" y="173" font-size="9.5" fill="#6b6b6b" text-anchor="middle">before_file_save</text>

  <!-- 훅 빠른검사 -->
  <rect x="210" y="115" width="180" height="86" rx="11" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="300" y="140" font-size="12" font-weight="700" fill="#b8860b" text-anchor="middle">훅 (2초 이내)</text>
  <text x="300" y="162" font-size="10" fill="#444" text-anchor="middle">간단한 패턴 검사</text>
  <text x="300" y="180" font-size="9.5" fill="#6b6b6b" text-anchor="middle">password= 등 감지</text>

  <!-- 통과 -->
  <rect x="210" y="245" width="180" height="46" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
  <text x="300" y="273" font-size="11" font-weight="700" fill="#1a7f37" text-anchor="middle">이상 없음 → 저장</text>

  <!-- 서브에이전트 -->
  <rect x="440" y="105" width="230" height="110" rx="11" fill="#ede9fe" stroke="#a78bda"/>
  <text x="555" y="130" font-size="12" font-weight="700" fill="#7c3aed" text-anchor="middle">security-auditor</text>
  <text x="555" y="152" font-size="9.5" fill="#444" text-anchor="middle">전체 파일 분석 (30초)</text>
  <text x="555" y="169" font-size="9.5" fill="#444" text-anchor="middle">외부 취약점 DB 조회</text>
  <text x="555" y="186" font-size="9.5" fill="#444" text-anchor="middle">OWASP Top 10 매핑</text>
  <text x="555" y="204" font-size="9" fill="#6b6b6b" text-anchor="middle">쓰기·삭제 도구 차단 (감사 전용)</text>

  <!-- 리포트 → 메인 -->
  <rect x="720" y="115" width="140" height="90" rx="11" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="790" y="145" font-size="11.5" font-weight="700" fill="#3a6fd6" text-anchor="middle">메인 에이전트</text>
  <text x="790" y="168" font-size="9.5" fill="#444" text-anchor="middle">리포트 수신 →</text>
  <text x="790" y="184" font-size="9.5" fill="#444" text-anchor="middle">사용자에 권고</text>

  <line x1="170" y1="158" x2="206" y2="158" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#hs_a)"/>
  <line x1="300" y1="201" x2="300" y2="241" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#hs_a)"/>
  <text x="316" y="228" font-size="9.5" fill="#1a7f37">통과</text>
  <line x1="390" y1="158" x2="436" y2="158" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#hs_a)"/>
  <text x="413" y="148" font-size="9" fill="#7c3aed" text-anchor="middle">재검토</text>
  <line x1="670" y1="160" x2="716" y2="160" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#hs_a)"/>
  <text x="693" y="150" font-size="9" fill="#3a6fd6" text-anchor="middle">리포트</text>

  <text x="450" y="320" font-size="11" fill="#6b6b6b" text-anchor="middle">빈번한 검사는 훅으로 가볍게, 가끔 필요한 깊은 감사는 서브에이전트로 무겁게</text>
</svg>
