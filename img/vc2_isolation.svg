<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">격리 모델 — 에이전트가 어디까지 닿을 수 있나</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">Cowork은 밀폐된 실험실, Code는 규칙 있는 사무실 책상입니다.</text>

  <!-- Cowork -->
  <rect x="40" y="92" width="400" height="280" rx="12" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="60" y="122" font-size="15" font-weight="700" fill="#b8860b">Cowork — Linux 샌드박스 VM</text>
  <rect x="60" y="140" width="360" height="120" rx="10" fill="#ffffff" stroke="#f0d6b8" stroke-dasharray="5 4"/>
  <text x="240" y="162" font-size="11" font-weight="700" fill="#b8860b" text-anchor="middle">격리된 VM (호스트와 분리)</text>
  <text x="240" y="186" font-size="10.5" fill="#444" text-anchor="middle">Python·Node·셸 실행 · 임시 파일 · 패키지 설치</text>
  <text x="240" y="208" font-size="10.5" fill="#444" text-anchor="middle">모두 VM 내부에서만 일어남</text>
  <text x="240" y="238" font-size="10" fill="#1a7f37" text-anchor="middle">실수해도 호스트 컴퓨터는 안전</text>
  <text x="60" y="286" font-size="11" font-weight="700" fill="#1a1a1a">호스트와의 통로는 둘뿐</text>
  <text x="60" y="308" font-size="10.5" fill="#444">① 마운트한 폴더 (명시적으로 허락한 것만)</text>
  <text x="60" y="328" font-size="10.5" fill="#444">② 권한 받은 앱 클릭/타이핑 (티어로 통제)</text>
  <text x="60" y="356" font-size="10.5" fill="#1a7f37">→ 격리 자체가 1차 안전, Plan/Accept가 2차</text>

  <!-- Code -->
  <rect x="460" y="92" width="400" height="280" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="480" y="122" font-size="15" font-weight="700" fill="#3a6fd6">Code — 호스트 OS 직접</text>
  <rect x="480" y="140" width="360" height="120" rx="10" fill="#ffffff" stroke="#bcd0f5"/>
  <text x="660" y="162" font-size="11" font-weight="700" fill="#3a6fd6" text-anchor="middle">사용자 권한 = 에이전트 권한</text>
  <text x="660" y="186" font-size="10.5" fill="#444" text-anchor="middle">별도 VM 없이 호스트 OS 위에서 직접 작업</text>
  <text x="660" y="208" font-size="10.5" fill="#444" text-anchor="middle">사용자가 닿는 모든 곳에 닿을 수 있음</text>
  <text x="660" y="238" font-size="10" fill="#b00020" text-anchor="middle">잘못 승인하면 시스템 손상 가능</text>
  <text x="480" y="286" font-size="11" font-weight="700" fill="#1a1a1a">안전은 어떻게?</text>
  <text x="480" y="308" font-size="10.5" fill="#444">매 작업 전 Plan/Accept로 사용자에게 물음</text>
  <text x="480" y="328" font-size="10.5" fill="#444">개발자는 명령을 알기에 빠르게 판단 가능</text>
  <text x="480" y="356" font-size="10.5" fill="#3a6fd6">→ Plan/Accept가 유일한 안전장치 (투명함)</text>
</svg>
