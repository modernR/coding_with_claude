<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">전문가 결과가 충돌할 때 — 세 가지 해결법</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">두 전문가가 모순된 결론을 낼 수 있습니다. 가장 안전한 방법은 사용자에게 묻는 것입니다.</text>
  <defs>
    <marker id="cr_a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9aa0a6"/></marker>
  </defs>
  <rect x="40" y="95" width="200" height="70" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="140" y="120" font-size="11" font-weight="700" fill="#3a6fd6" text-anchor="middle">architect</text>
  <text x="140" y="142" font-size="10" fill="#444" text-anchor="middle">"DB는 PostgreSQL"</text>
  <rect x="40" y="180" width="200" height="70" rx="10" fill="#fff7e6" stroke="#f3d488"/>
  <text x="140" y="205" font-size="11" font-weight="700" fill="#b8860b" text-anchor="middle">backend-implementer</text>
  <text x="140" y="227" font-size="10" fill="#444" text-anchor="middle">"MongoDB로 시작"</text>
  <text x="140" y="278" font-size="12" font-weight="700" fill="#b00020" text-anchor="middle">모순 발생</text>
  <line x1="246" y1="172" x2="300" y2="172" stroke="#9aa0a6" stroke-width="1.6" marker-end="url(#cr_a)"/>
  <g>
    <rect x="310" y="95" width="550" height="52" rx="10" fill="#f1faf3" stroke="#cfe9d7"/>
    <text x="330" y="117" font-size="12" font-weight="700" fill="#1a7f37">① 사용자에게 묻기</text>
    <text x="330" y="137" font-size="10.5" fill="#444">가장 안전 · 빠르고 정확 — 메인이 사용자에게 판단을 요청</text>
    <rect x="310" y="157" width="550" height="52" rx="10" fill="#eef3fd" stroke="#bcd0f5"/>
    <text x="330" y="179" font-size="12" font-weight="700" fill="#3a6fd6">② 결정자 에이전트 호출</text>
    <text x="330" y="199" font-size="10.5" fill="#444">tech-decision-maker 같은 별도 에이전트가 판정</text>
    <rect x="310" y="219" width="550" height="52" rx="10" fill="#fff7e6" stroke="#f3d488"/>
    <text x="330" y="241" font-size="12" font-weight="700" fill="#b8860b">③ 약속된 우선순위 적용</text>
    <text x="330" y="261" font-size="10.5" fill="#444">사전 규칙으로 자동 해소 (예: architect 결과 우선)</text>
  </g>
  <text x="585" y="298" font-size="11" fill="#b00020" text-anchor="middle">가장 안전한 기본값: ① 사용자에게 묻기</text>
</svg>
