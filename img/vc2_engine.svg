<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <text x="40" y="40" font-size="21" font-weight="700" fill="#1a1a1a">같은 엔진, 두 가지 표현</text>
  <text x="40" y="65" font-size="14" fill="#6b6b6b">Cowork은 Claude Code 위에 올라가 있습니다. 깊은 원리는 같고, 입는 옷만 다릅니다.</text>

  <!-- center engine -->
  <rect x="330" y="150" width="240" height="96" rx="12" fill="#1a1a1a"/>
  <text x="450" y="184" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">공통 엔진</text>
  <text x="450" y="206" font-size="10.5" fill="#cfcfcf" text-anchor="middle">도구 호출 · Plan/Accept · 슬래시</text>
  <text x="450" y="222" font-size="10.5" fill="#cfcfcf" text-anchor="middle">MCP · 스킬 · 플러그인</text>

  <!-- Code -->
  <rect x="40" y="150" width="240" height="96" rx="12" fill="#eef3fd" stroke="#bcd0f5"/>
  <text x="160" y="182" font-size="14" font-weight="700" fill="#3a6fd6" text-anchor="middle">Claude Code</text>
  <text x="160" y="204" font-size="10.5" fill="#3a6fd6" text-anchor="middle">터미널(CLI)</text>
  <text x="160" y="222" font-size="10.5" fill="#6b6b6b" text-anchor="middle">개발자의 옷</text>

  <!-- Cowork -->
  <rect x="620" y="150" width="240" height="96" rx="12" fill="#fff7ef" stroke="#f0d6b8"/>
  <text x="740" y="182" font-size="14" font-weight="700" fill="#b8860b" text-anchor="middle">Claude Cowork</text>
  <text x="740" y="204" font-size="10.5" fill="#b8860b" text-anchor="middle">데스크톱 GUI</text>
  <text x="740" y="222" font-size="10.5" fill="#6b6b6b" text-anchor="middle">비개발자의 옷</text>

  <line x1="280" y1="198" x2="330" y2="198" stroke="#9aa0a6" stroke-width="1.6"/>
  <line x1="570" y1="198" x2="620" y2="198" stroke="#9aa0a6" stroke-width="1.6"/>

  <!-- 5 옷의 차이 -->
  <rect x="40" y="270" width="820" height="106" rx="10" fill="#fafbfc" stroke="#e3e6ea"/>
  <text x="56" y="294" font-size="12.5" font-weight="700" fill="#1a1a1a">비개발자에게 입힌 다섯 가지 옷</text>
  <g font-size="11">
    <text x="56" y="318" fill="#3a6fd6">터미널</text><text x="120" y="318" fill="#9aa0a6">→</text><text x="140" y="318" fill="#b8860b">GUI 데스크톱 앱</text>
    <text x="320" y="318" fill="#3a6fd6">호스트 OS 직접</text><text x="430" y="318" fill="#9aa0a6">→</text><text x="450" y="318" fill="#b8860b">격리 Linux 샌드박스</text>
    <text x="56" y="340" fill="#3a6fd6">cwd 자동 접근</text><text x="160" y="340" fill="#9aa0a6">→</text><text x="180" y="340" fill="#b8860b">명시적 폴더 마운트</text>
    <text x="320" y="340" fill="#3a6fd6">매번 Plan/Accept</text><text x="445" y="340" fill="#9aa0a6">→</text><text x="465" y="340" fill="#b8860b">앱별 권한 티어</text>
    <text x="56" y="362" fill="#3a6fd6">CLI 슬래시 풀세트</text><text x="185" y="362" fill="#9aa0a6">→</text><text x="205" y="362" fill="#b8860b">GUI 버튼 + 동일 슬래시</text>
  </g>
</svg>
